<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Instructor - Oposiciones</title>
    
    <!-- Firebase SDK (Solo lo necesario) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent: #3b82f6;
            --text-light: #f8fafc;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Pantalla de Login Limpia */
        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--sidebar-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            width: 320px;
        }

        /* Layout */
        #main-container { display: none; width: 100%; height: 100%; }

        aside {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #334155;
        }

        .sidebar-header { padding: 20px; text-align: center; border-bottom: 1px solid #334155; }
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item:hover { background: #334155; }
        .nav-item.active { background: var(--accent); }

        main { flex-grow: 1; padding: 30px; overflow-y: auto; }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #334155;
        }

        input, select {
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            padding: 10px;
            border-radius: 5px;
            width: 100%;
            box-sizing: border-box;
        }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <!-- LOGIN POR ID (Único método) -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Acceso Instructor</h2>
            <div style="margin-top: 20px;">
                <input type="password" id="input-id-acceso" placeholder="Introduce tu ID" style="margin-bottom: 15px; text-align: center;">
                <button class="primary" onclick="loginPorID()">Entrar</button>
            </div>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div id="main-container">
        <aside>
            <div class="sidebar-header">
                <h3 id="display-nombre">Instructor</h3>
                <small id="display-rango" style="color: var(--success);"></small>
            </div>
            
            <nav style="flex-grow: 1; padding-top: 10px;">
                <div class="nav-item active" onclick="showSection('admin')">🏠 General (Admin)</div>
                <div class="nav-item" onclick="showSection('gc')">🟢 Guardia Civil</div>
                <div class="nav-item" onclick="showSection('cnp')">🔵 CNP</div>
            </nav>

            <div style="padding: 20px;">
                <button onclick="cerrarSesion()" style="background: var(--danger); border: none; color: white; width: 100%; padding: 8px; border-radius: 5px; cursor: pointer;">Salir</button>
            </div>
        </aside>

        <main>
            <section id="sec-admin">
                <h2>Panel Administrativo</h2>
                <div class="card">
                    <h3>Aviso Global</h3>
                    <input type="text" id="msg-global" placeholder="Escribe un mensaje..." style="margin-bottom: 10px;">
                    <button class="primary" onclick="enviarAviso()" style="width: auto;">Publicar Aviso</button>
                </div>
            </section>

            <section id="sec-cuerpo" class="hidden">
                <h2 id="titulo-cuerpo">Gestión de Alumnos</h2>
                <div class="card">
                    <h3>Enviar Examen</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <input type="text" id="ex-id" placeholder="ID del Alumno">
                        <input type="text" id="ex-nom" placeholder="Nombre del Test">
                        <input type="text" id="ex-url" placeholder="Enlace al Test">
                        <button class="primary" onclick="mandarExamen()">Enviar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN
        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ACCESO (SIN MEMORIA)
        function loginPorID() {
            const id = document.getElementById('input-id-acceso').value.trim();
            if (!id) return alert("Introduce una ID");

            db.ref(`instructor/${id}`).once('value', snapshot => {
                const data = snapshot.val();
                if (data) {
                    // Cambiar vista
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-container').style.display = 'flex';
                    
                    // Cargar datos
                    document.getElementById('display-nombre').innerText = data.nombre || "Instructor";
                    document.getElementById('display-rango').innerText = data.admin ? "ADMINISTRADOR" : "INSTRUCTOR";
                } else {
                    alert("ID no válida o sin permisos.");
                }
            });
        }

        function cerrarSesion() {
            // Al no haber memoria, simplemente recargamos
            location.reload();
        }

        function showSection(tipo) {
            const admin = document.getElementById('sec-admin');
            const cuerpo = document.getElementById('sec-cuerpo');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            if (tipo === 'admin') {
                admin.classList.remove('hidden');
                cuerpo.classList.add('hidden');
            } else {
                admin.classList.add('hidden');
                cuerpo.classList.remove('hidden');
                document.getElementById('titulo-cuerpo').innerText = "Gestión: " + tipo.toUpperCase();
            }
        }

        function enviarAviso() {
            const m = document.getElementById('msg-global').value;
            db.ref('avisos/actual').set({
                mensaje: m,
                hora: new Date().toLocaleTimeString('es-ES')
            }).then(() => alert("Aviso enviado"));
        }

        function mandarExamen() {
            const alum = document.getElementById('ex-id').value;
            db.ref(`examenes_enviados/${alum}`).push({
                nombre: document.getElementById('ex-nom').value,
                link: document.getElementById('ex-url').value,
                fecha: new Date().toLocaleDateString('es-ES')
            }).then(() => alert("Examen enviado"));
        }
    </script>
</body>
</html>
