<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Alumno - PAU</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body style="font-family: sans-serif; margin:0; background:#f0f7f4; text-align:center;">
    <div id="login" style="padding:50px;">
        <h2>Introduce tu Código</h2>
        <input type="text" id="miID" placeholder="Tu ID aquí" style="padding:10px; width:200px;">
        <button onclick="buscarExamen()" style="padding:10px 20px; background:#2ecc71; color:white; border:none; cursor:pointer;">ENTRAR</button>
    </div>

    <div id="visor" style="display:none;">
        <div style="background:#2ecc71; color:white; padding:10px;">EXAMEN CARGADO</div>
        <iframe id="iframeExamen" style="width:100%; height:90vh; border:none;"></iframe>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        function buscarExamen() {
            const id = document.getElementById('miID').value;
            if(!id) return alert("Escribe tu ID");

            db.ref('examenes/' + id).on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('visor').style.display = 'block';
                    document.getElementById('iframeExamen').src = data.url;
                } else {
                    alert("Aún no tienes exámenes asignados.");
                }
            });
        }
    </script>
</body>
</html>
