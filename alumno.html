<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Alumno - Firebase</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #e9ecef; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .exam-card { background: #f8f9fa; border-left: 5px solid #007bff; padding: 15px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        
        /* Modal */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; z-index: 100; }
        #modal iframe { width: 95%; height: 85%; margin: auto; border: none; background: white; border-radius: 8px; }
        .close { color: white; text-align: right; padding: 15px; font-size: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <!-- Login -->
    <div id="login" class="box">
        <h2>Acceso Alumnos</h2>
        <input type="text" id="nombre" placeholder="Nombre (opcional)">
        <input type="text" id="id_login" placeholder="Tu ID de Alumno">
        <button id="btnEntrar">Entrar al Portal</button>
    </div>

    <!-- Dashboard -->
    <div id="portal" class="box hidden">
        <h2 id="bienvenida">Mis Exámenes</h2>
        <div id="listaExamenes">Cargando exámenes...</div>
        <br>
        <button onclick="location.reload()" style="background:#6c757d">Salir</button>
    </div>
</div>

<!-- Vista Examen -->
<div id="modal">
    <div class="close" id="btnCerrar">× Cerrar</div>
    <iframe id="frame" src=""></iframe>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
        authDomain: "examenes-profesoralumno.firebaseapp.com",
        databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "examenes-profesoralumno",
        storageBucket: "examenes-profesoralumno.firebasestorage.app",
        messagingSenderId: "503796832177",
        appId: "1:503796832177:web:b306d6971c8ed7a9becf90",
        measurementId: "G-2662GS0WE7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const btnEntrar = document.getElementById('btnEntrar');
    const loginDiv = document.getElementById('login');
    const portalDiv = document.getElementById('portal');

    btnEntrar.onclick = async () => {
        const id = document.getElementById('id_login').value.trim();
        const nombre = document.getElementById('nombre').value || "Alumno";

        if(!id) return alert("Introduce tu ID");

        // Verificar si el alumno existe en Firebase
        const snapshot = await get(ref(db, 'alumnos/' + id));
        
        if (snapshot.exists()) {
            loginDiv.classList.add('hidden');
            portalDiv.classList.remove('hidden');
            document.getElementById('bienvenida').innerText = `Hola, ${nombre}`;
            escucharExamenes(id);
        } else {
            alert("El ID no existe en el sistema.");
        }
    };

    function escucharExamenes(id) {
        const examenesRef = ref(db, 'examenes/' + id);
        onValue(examenesRef, (snapshot) => {
            const data = snapshot.val();
            const lista = document.getElementById('listaExamenes');
            lista.innerHTML = "";

            if (!data) {
                lista.innerHTML = "<p>No tienes exámenes pendientes.</p>";
                return;
            }

            Object.values(data).forEach(ex => {
                const div = document.createElement('div');
                div.className = 'exam-card';
                div.innerHTML = `
                    <strong>${ex.titulo}</strong>
                    <button onclick="window.abrirModal('${ex.url}')">Abrir Examen</button>
                `;
                lista.appendChild(div);
            });
        });
    }

    // Funciones globales para el modal
    window.abrirModal = (url) => {
        document.getElementById('frame').src = url;
        document.getElementById('modal').style.display = 'flex';
    };

    document.getElementById('btnCerrar').onclick = () => {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('frame').src = "";
    };
</script>

</body>
</html>
