<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.E. - Portal de Seguridad</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #020617;
            --accent-emerald: #10b981;
            --accent-gold: #fbbf24;
            --bg-card: rgba(30, 41, 59, 0.5);
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --border: #1e293b;
            --discord: #5865F2;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--primary); 
            color: var(--text-main); 
            margin: 0; 
            background-image: radial-gradient(circle at 50% -20%, #1e293b 0%, #020617 80%);
            min-height: 100vh;
        }

        /* --- PANTALLA DE ACCESO --- */
        #login-screen {
            position: fixed; inset: 0; 
            display: flex; align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .login-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            padding: 50px 40px; border-radius: 32px; 
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* --- NAVEGACIÓN --- */
        .navbar {
            padding: 15px 40px; background: rgba(2, 6, 23, 0.8); 
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px; display: none; }
        .grid-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }

        .card {
            background: var(--bg-card); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 25px;
        }

        /* --- ESTILOS DE PRUEBAS --- */
        .exam-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: rgba(15, 23, 42, 0.4); border-radius: 16px;
            border: 1px solid var(--border); margin-bottom: 15px;
            transition: transform 0.2s;
        }
        .exam-item:hover { transform: translateX(5px); border-color: var(--accent-emerald); }
        
        .dept-tag { font-size: 0.6rem; font-weight: 800; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; margin-bottom: 8px; display: inline-block; color: white; }
        
        .nota-box {
            font-family: 'JetBrains Mono', monospace; font-size: 1.8rem; font-weight: 800;
            min-width: 60px; text-align: center;
        }

        /* --- CHAT --- */
        #chat-display { height: 350px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .msg { padding: 12px 18px; border-radius: 18px; font-size: 0.85rem; max-width: 85%; line-height: 1.5; }
        .msg-alum { align-self: flex-end; background: var(--accent-emerald); color: #020617; font-weight: 600; border-bottom-right-radius: 4px; }
        .msg-prof { align-self: flex-start; background: #334155; color: white; border-bottom-left-radius: 4px; }

        /* --- BOTONES --- */
        .btn {
            padding: 14px 24px; border-radius: 12px; border: none; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 0.7rem;
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            letter-spacing: 1px;
        }
        .btn-primary { background: var(--text-main); color: var(--primary); }
        .btn-discord { background: var(--discord); color: white; font-size: 0.8rem; }
        .btn-discord:hover { background: #4752c4; transform: translateY(-2px); box-shadow: 0 10px 20px -10px var(--discord); }

        .input-style {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border);
            padding: 14px; border-radius: 10px; color: white; box-sizing: border-box; outline: none;
        }
        .input-style:focus { border-color: var(--accent-emerald); }

        @media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- ACCESO (Solo Discord) -->
    <div id="login-screen">
        <div class="login-card">
            <div style="color: var(--accent-emerald); font-weight: 800; font-size: 0.75rem; letter-spacing: 3px; margin-bottom: 10px;">SEGURIDAD CENTRAL</div>
            <div style="font-weight: 800; font-size: 2rem; margin-bottom: 5px;">S.I.G.E.</div>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 40px;">Identifíquese mediante la pasarela oficial para acceder a su expediente.</p>
            
            <button class="btn btn-discord" style="width: 100%;" onclick="loginDiscord()">
                <i class="fab fa-discord" style="font-size: 1.2rem;"></i> Entrar con Discord
            </button>
            
            <div style="margin-top: 30px; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">
                <i class="fas fa-lock"></i> Conexión Encriptada
            </div>
        </div>
    </div>

    <!-- PANEL -->
    <nav class="navbar" id="nav-panel" style="display: none;">
        <div style="font-weight: 800; letter-spacing: 1px;">S.I.G.E. <span id="dept-label" style="color:var(--accent-emerald)">// ASPIRANTE</span></div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <div id="welcome-msg" style="font-size: 0.8rem; font-weight: 800; color: var(--text-dim);"></div>
            <button onclick="location.reload()" class="btn" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 15px;">Desconectar</button>
        </div>
    </nav>

    <div class="container" id="panel-alumno">
        <div class="grid-layout">
            <div class="main-col">
                <div class="card" style="border-top: 4px solid var(--accent-emerald);">
                    <h3 style="margin-top: 0; font-size: 0.7rem; letter-spacing: 2px; color: var(--accent-emerald); text-transform: uppercase;">Observaciones del Tribunal</h3>
                    <div id="roadmap-content" style="line-height: 1.7; font-weight: 500; font-size: 0.95rem; white-space: pre-wrap; color: #cbd5e1;">Cargando...</div>
                </div>

                <div class="card">
                    <h3 style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 25px; text-transform: uppercase;">Registro de Calificaciones</h3>
                    <div id="tasks-container"></div>
                </div>
            </div>

            <div class="side-col">
                <div class="card" style="background: linear-gradient(180deg, rgba(16, 185, 129, 0.1) 0%, rgba(2, 6, 23, 0) 100%); text-align: center; border-color: rgba(16, 185, 129, 0.2);">
                    <p style="font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-emerald);">Hora en España</p>
                    <div id="timer-display" style="font-size: 2.8rem; font-weight: 800; margin: 10px 0; font-family: 'JetBrains Mono'; color: var(--text-main);">--:--:--</div>
                    <div style="font-size: 0.7rem; color: var(--text-dim);"><i class="fas fa-map-marker-alt"></i> Sede Valladolid</div>
                </div>

                <div class="card">
                    <h3 style="font-size: 0.7rem; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase;"><i class="fas fa-comment-dots"></i> Mensajes Directos</h3>
                    <div id="chat-display"></div>
                    <div style="display: flex; gap: 8px; margin-top: 15px;">
                        <input type="text" id="msg_input" class="input-style" placeholder="Escriba aquí..." onkeyup="if(event.key === 'Enter') enviarMensaje()">
                        <button class="btn btn-primary" style="padding: 0 15px; border-radius: 10px;" onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentAlumId = null;

        const CLIENT_ID = '1500201403484737616'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        window.loginDiscord = () => {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        };

        async function checkDiscordCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (accessToken) {
                try {
                    const response = await fetch('https://discord.com/api/users/@me', {
                        headers: { Authorization: `Bearer ${accessToken}` }
                    });
                    const userData = await response.json();
                    
                    if (userData.username) {
                        window.history.replaceState({}, document.title, window.location.pathname);
                        entrarAlSistema(userData.username);
                    }
                } catch (e) {
                    console.error("Error Discord:", e);
                }
            }
        }

        function entrarAlSistema(id) {
            currentAlumId = id;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('nav-panel').style.display = 'flex';
            document.getElementById('panel-alumno').style.display = 'block';
            document.getElementById('welcome-msg').innerText = `ID: ${id.toUpperCase()}`;
            inicializarDatos(id);
        }

        function inicializarDatos(id) {
            onValue(ref(db, 'planificacion/' + id), (snap) => {
                document.getElementById('roadmap-content').innerText = snap.exists() ? snap.val().objetivos : "No hay observaciones en su expediente.";
            });

            onValue(ref(db, 'examenes/' + id), (snap) => {
                const container = document.getElementById('tasks-container');
                container.innerHTML = "";
                if(snap.exists()) {
                    Object.values(snap.val()).reverse().forEach(t => {
                        const nota = t.nota || '--';
                        const notaColor = nota !== '--' ? (parseFloat(nota) >= 5 ? '#10b981' : '#ef4444') : 'var(--text-dim)';
                        container.innerHTML += `
                            <div class="exam-item">
                                <div>
                                    <span class="dept-tag" style="background: #1e293b; border: 1px solid var(--border)">${t.dept || 'GRL'}</span>
                                    <div style="font-weight: 800; font-size: 1rem;">${t.titulo}</div>
                                    <div style="font-size: 0.75rem; color: var(--text-dim); margin-top: 5px;">${t.comentario || 'Pendiente de revisión'}</div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    ${!t.nota ? `<a href="${t.url}" target="_blank" class="btn btn-primary" style="padding: 8px 15px;">Realizar</a>` : ''}
                                    <div class="nota-box" style="color: ${notaColor}">${nota}</div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='color:var(--text-dim); text-align:center;'>Expediente vacío.</p>";
                }
            });

            onValue(ref(db, 'chats/' + id), (snap) => {
                const box = document.getElementById('chat-display');
                box.innerHTML = "";
                if(snap.exists()) {
                    Object.values(snap.val()).forEach(m => {
                        box.innerHTML += `<div class="msg ${m.autor === 'profesor' ? 'msg-prof' : 'msg-alum'}">${m.texto}</div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        window.enviarMensaje = async () => {
            const input = document.getElementById('msg_input');
            if(input.value.trim() && currentAlumId) {
                await push(ref(db, 'chats/' + currentAlumId), {
                    texto: input.value,
                    autor: "alumno",
                    fecha: Date.now()
                });
                input.value = "";
            }
        };

        function updateTimer() {
            document.getElementById('timer-display').innerText = new Date().toLocaleTimeString('es-ES', { hour12: false });
        }
        
        setInterval(updateTimer, 1000); 
        updateTimer();
        checkDiscordCallback();
    </script>
</body>
</html>
