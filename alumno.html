<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Estudiantil | EduManager</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --accent: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #e0e7ff, var(--bg));
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
        }

        /* --- LOGIN --- */
        .login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            width: 100%; max-width: 400px; border: 1px solid white;
        }

        /* --- DASHBOARD --- */
        .navbar {
            background: white; padding: 15px 5%; display: flex; 
            justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* Stats Row */
        .stats-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 30px; 
        }
        .stat-card {
            background: white; padding: 20px; border-radius: 16px;
            display: flex; align-items: center; gap: 15px; border: 1px solid #eee;
        }
        .stat-icon { 
            width: 45px; height: 45px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }

        /* Tabs */
        .nav-tabs { 
            display: flex; gap: 10px; margin-bottom: 25px; background: #e2e8f0; 
            padding: 5px; border-radius: 12px; width: fit-content;
        }
        .nav-tab { 
            padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600;
            transition: 0.3s; color: var(--text-muted);
        }
        .nav-tab.active { background: white; color: var(--primary); shadow: 0 4px 6px rgba(0,0,0,0.05); }

        /* Content Cards */
        .content-grid { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
        .exam-card {
            background: white; border-radius: 18px; padding: 20px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; border: 1px solid transparent; transition: 0.3s;
        }
        .exam-card:hover { border-color: var(--primary); transform: translateX(5px); }
        
        .grade-pill {
            padding: 8px 16px; border-radius: 12px; font-weight: 800; font-size: 1.1rem;
        }

        /* Chat Styles */
        #chat-container {
            background: white; border-radius: 18px; height: 450px; 
            display: flex; flex-direction: column; overflow: hidden; border: 1px solid #eee;
        }
        #chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background: #f9fafb; }
        .msg { padding: 10px 14px; border-radius: 14px; max-width: 85%; font-size: 0.9rem; line-height: 1.4; }
        .msg-student { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        .msg-teacher { align-self: flex-start; background: white; border: 1px solid #e5e7eb; border-bottom-left-radius: 2px; }

        /* Forms */
        input { 
            width: 100%; padding: 12px 16px; border: 2px solid #e5e7eb; border-radius: 12px;
            font-family: inherit; margin-bottom: 15px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        
        .btn {
            padding: 12px 24px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        /* Modal */
        #modalExamen {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px); display: none; flex-direction: column; z-index: 1000;
        }

        .hidden { display: none !important; }

        @media (max-width: 900px) {
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- PANTALLA LOGIN -->
    <div id="sectionLogin" class="login-screen">
        <div class="login-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <div style="background: #eef2ff; width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
                    <i class="fas fa-graduation-cap fa-2x" style="color: var(--primary);"></i>
                </div>
                <h2 style="margin: 0;">¡Bienvenido!</h2>
                <p style="color: var(--text-muted);">Accede a tus clases y notas</p>
            </div>
            
            <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Tu ID de Estudiante</label>
            <input type="text" id="idEstudiante" placeholder="ej: ALUM-001">
            <button class="btn btn-primary" onclick="intentarLogin()" style="width: 100%;">
                Comenzar <i class="fas fa-arrow-right"></i>
            </button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="sectionDashboard" class="hidden">
        <nav class="navbar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fas fa-circle-nodes style="color: var(--primary);"></i>
                <span style="font-weight: 800; letter-spacing: -0.5px; font-size: 1.2rem;">EduManager <span style="color: var(--primary);">Student</span></span>
            </div>
            <div style="display: flex; align-items: center; gap: 20px;">
                <span id="labelNombre" style="font-weight: 600; font-size: 0.9rem;">Cargando...</span>
                <button onclick="location.reload()" class="btn" style="background: #fee2e2; color: var(--danger); padding: 8px 15px;"><i class="fas fa-power-off"></i></button>
            </div>
        </nav>

        <div class="container">
            <!-- Stats -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #ecfdf5; color: var(--accent);"><i class="fas fa-check-double"></i></div>
                    <div><div style="font-size: 1.2rem; font-weight: 800;" id="statPendientes">0</div><div style="color: var(--text-muted); font-size: 0.75rem;">Tareas Pendientes</div></div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #eef2ff; color: var(--primary);"><i class="fas fa-star"></i></div>
                    <div><div style="font-size: 1.2rem; font-weight: 800;" id="statPromedio">-</div><div style="color: var(--text-muted); font-size: 0.75rem;">Promedio Actual</div></div>
                </div>
            </div>

            <div class="content-grid">
                <!-- Columna Principal -->
                <div class="col-main">
                    <div class="nav-tabs">
                        <div class="nav-tab active" onclick="cambiarVista('tareas', this)">Tareas</div>
                        <div class="nav-tab" onclick="cambiarVista('notas', this)">Calificaciones</div>
                        <div class="nav-tab" onclick="cambiarVista('recursos', this)">Recursos</div>
                    </div>

                    <div id="vista-tareas" class="listado"></div>
                    <div id="vista-notas" class="listado hidden"></div>
                    <div id="vista-recursos" class="listado hidden"></div>
                </div>

                <!-- Columna Secundaria: Chat -->
                <div class="col-side">
                    <h4 style="margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-comment-dots" style="color: var(--primary);"></i> Consultas al Profesor
                    </h4>
                    <div id="chat-container">
                        <div id="chat-messages"></div>
                        <div style="padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 8px;">
                            <input type="text" id="inputMsg" placeholder="Pregunta algo..." style="margin-bottom: 0; padding: 10px;">
                            <button class="btn btn-primary" style="padding: 10px;" onclick="enviarMsg()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE EXAMEN -->
    <div id="modalExamen">
        <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center; color: white;">
            <h3 id="modalTitle" style="margin:0;">Examen en curso</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="background: rgba(255,255,255,0.1); color: white;" onclick="window.open(document.getElementById('frameExamen').src, '_blank')"><i class="fas fa-external-link-alt"></i></button>
                <button class="btn" style="background: var(--danger); color: white;" onclick="cerrarExamen()">&times; Cerrar</button>
            </div>
        </div>
        <iframe id="frameExamen" style="flex-grow: 1; border: none; background: white; margin: 0 20px 20px; border-radius: 15px;"></iframe>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Mismo Config de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90",
            measurementId: "G-2662GS0WE7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let idActual = "";

        window.intentarLogin = async () => {
            const id = document.getElementById('idEstudiante').value.trim();
            if(!id) return;

            const snap = await get(ref(db, `alumnos/${id}`));
            if(snap.exists()) {
                idActual = id;
                document.getElementById('sectionLogin').classList.add('hidden');
                document.getElementById('sectionDashboard').classList.remove('hidden');
                document.getElementById('labelNombre').innerText = "Estudiante: " + id;
                iniciarSincronizacion();
            } else {
                alert("ID no encontrado en la base de datos.");
            }
        };

        function iniciarSincronizacion() {
            // Sincronizar Exámenes y Notas
            onValue(ref(db, `examenes/${idActual}`), (snap) => {
                const data = snap.val();
                renderizarExamenes(data);
            });

            // Sincronizar Chat
            onValue(ref(db, `chats/${idActual}`), (snap) => {
                const chatBox = document.getElementById('chat-messages');
                chatBox.innerHTML = "";
                const msgs = snap.val();
                if(msgs) {
                    Object.values(msgs).forEach(m => {
                        const esMio = m.autor === "estudiante";
                        chatBox.innerHTML += `<div class="msg ${esMio ? 'msg-student' : 'msg-teacher'}">${m.texto}</div>`;
                    });
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            });

            // Sincronizar Recursos
            onValue(ref(db, `recursos/${idActual}`), (snap) => {
                renderizarRecursos(snap.val());
            });
        }

        function renderizarExamenes(data) {
            const listTareas = document.getElementById('vista-tareas');
            const listNotas = document.getElementById('vista-notas');
            listTareas.innerHTML = "";
            listNotas.innerHTML = "";
            
            let pendientes = 0;
            let sumaNotas = 0;
            let contNotas = 0;

            if(!data) {
                listTareas.innerHTML = "<p style='color:gray; text-align:center;'>No tienes tareas asignadas aún.</p>";
                return;
            }

            Object.entries(data).forEach(([key, ex]) => {
                const card = document.createElement('div');
                card.className = 'exam-card';

                if(ex.nota === undefined) {
                    pendientes++;
                    card.innerHTML = `
                        <div>
                            <h4 style="margin:0;">${ex.titulo}</h4>
                            <small style="color:var(--text-muted)">Asignado: ${new Date(ex.fecha).toLocaleDateString()}</small>
                        </div>
                        <button class="btn btn-primary" onclick="abrirExamen('${ex.url}', '${ex.titulo}')">Abrir Tarea</button>
                    `;
                    listTareas.appendChild(card);
                } else {
                    sumaNotas += parseFloat(ex.nota);
                    contNotas++;
                    const colorNota = ex.nota >= 5 ? 'var(--accent)' : 'var(--danger)';
                    const bgNota = ex.nota >= 5 ? '#d1fae5' : '#fee2e2';
                    card.innerHTML = `
                        <div>
                            <h4 style="margin:0;">${ex.titulo}</h4>
                            <p style="margin:5px 0 0; font-size:0.85rem; color:#6b7280;">${ex.comentario || 'Sin comentarios'}</p>
                        </div>
                        <div class="grade-pill" style="background:${bgNota}; color:${colorNota}">${ex.nota}</div>
                    `;
                    listNotas.appendChild(card);
                }
            });

            document.getElementById('statPendientes').innerText = pendientes;
            document.getElementById('statPromedio').innerText = contNotas > 0 ? (sumaNotas/contNotas).toFixed(1) : '-';
        }

        function renderizarRecursos(recursos) {
            const container = document.getElementById('vista-recursos');
            container.innerHTML = "";
            if(!recursos) {
                container.innerHTML = "<p>No hay material extra compartido.</p>";
                return;
            }
            Object.values(recursos).forEach(r => {
                container.innerHTML += `
                    <div class="exam-card">
                        <div>
                            <h4 style="margin:0;"><i class="fas fa-file-pdf" style="color:var(--danger)"></i> ${r.nombre}</h4>
                        </div>
                        <a href="${r.url}" target="_blank" class="btn" style="background:#eef2ff; color:var(--primary)">Descargar</a>
                    </div>
                `;
            });
        }

        window.enviarMsg = async () => {
            const input = document.getElementById('inputMsg');
            if(!input.value.trim()) return;
            await push(ref(db, `chats/${idActual}`), {
                texto: input.value,
                autor: "estudiante",
                fecha: Date.now()
            });
            input.value = "";
        };

        window.cambiarVista = (vista, el) => {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('vista-tareas').classList.add('hidden');
            document.getElementById('vista-notas').classList.add('hidden');
            document.getElementById('vista-recursos').classList.add('hidden');
            document.getElementById('vista-' + vista).classList.remove('hidden');
        };

        window.abrirExamen = (url, titulo) => {
            document.getElementById('modalTitle').innerText = titulo;
            document.getElementById('frameExamen').src = url;
            document.getElementById('modalExamen').style.display = 'flex';
        };

        window.cerrarExamen = () => {
            document.getElementById('modalExamen').style.display = 'none';
            document.getElementById('frameExamen').src = "";
        };

    </script>
</body>
</html>
