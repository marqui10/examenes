<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I.G.E PRO - Alumno</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#05070a;
    --card:#0f121a;
    --border:#1e293b;
    --text:#f8fafc;
    --dim:#94a3b8;
    --ok:#10b981;
    --bad:#ef4444;
}

body {
    margin:0;
    font-family:'Plus Jakarta Sans';
    background:var(--bg);
    color:var(--text);
}

/* LOGIN */
#login {
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

.box {
    background:var(--card);
    padding:30px;
    border:1px solid var(--border);
    border-radius:12px;
}

/* NAV */
.nav {
    display:none;
    padding:20px;
    border-bottom:1px solid var(--border);
    justify-content:space-between;
}

/* MAIN */
.container {
    display:none;
    padding:30px;
}

.grid {
    display:grid;
    grid-template-columns: 1fr 350px;
    gap:20px;
}

/* CARD */
.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

/* EXAM */
.exam {
    background:#000;
    padding:15px;
    margin-bottom:10px;
    border-left:4px solid var(--border);
}

.apto { border-color:var(--ok); }
.noapto { border-color:var(--bad); }

/* CHAT */
#chat {
    height:300px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg {
    padding:10px;
    border-radius:10px;
    max-width:75%;
}

.alum { background:#2563eb; align-self:flex-end; }
.prof { background:#1e293b; align-self:flex-start; }

/* INPUT */
input {
    width:100%;
    padding:10px;
    background:#000;
    border:1px solid var(--border);
    color:white;
}

/* BUTTON */
.btn {
    padding:10px;
    background:white;
    color:black;
    border:none;
    font-weight:800;
    cursor:pointer;
}

/* TOAST */
#toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#000;
    padding:10px;
    display:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="box">
        <h3>Acceso Alumno</h3>
        <input id="user" placeholder="ID">
        <button class="btn" onclick="login()">Entrar</button>
    </div>
</div>

<!-- NAV -->
<div class="nav" id="nav">
    <div id="userLabel"></div>
    <button class="btn" onclick="logout()">Salir</button>
</div>

<!-- MAIN -->
<div class="container" id="app">

<div class="grid">

<!-- IZQUIERDA -->
<div>

<div class="card">
    <h3>Observaciones</h3>
    <div id="obs">Cargando...</div>
</div>

<div class="card">
    <h3>Exámenes</h3>
    <div id="exams"></div>
</div>

</div>

<!-- DERECHA -->
<div>

<div class="card">
    <h3>Chat</h3>
    <div id="chat"></div>

    <div style="display:flex; gap:5px; margin-top:10px;">
        <input id="msg">
        <button class="btn" onclick="send()">OK</button>
    </div>
</div>

</div>

</div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
    apiKey:"TU_API",
    databaseURL:"TU_DB"
});

const db = getDatabase(app);

let uid = null;

/* ===== UTILS ===== */

const $ = id => document.getElementById(id);

function toast(t) {
    const el = $("toast");
    el.innerText = t;
    el.style.display="block";
    setTimeout(()=>el.style.display="none",2000);
}

function clean(t){
    return t.replace(/[<>]/g,"");
}

/* ===== LOGIN ===== */

window.login = () => {
    const id = clean($("user").value);
    if(!id) return;

    uid = id;

    $("login").style.display="none";
    $("nav").style.display="flex";
    $("app").style.display="block";

    $("userLabel").innerText = "Alumno: " + id;

    init(id);
};

window.logout = ()=>location.reload();

/* ===== INIT ===== */

function init(id){

    /* OBS */
    onValue(ref(db,"planificacion/"+id),(snap)=>{
        $("obs").innerText = snap.exists() 
            ? snap.val().objetivos 
            : "Sin observaciones";
    });

    /* EXAMS */
    onValue(ref(db,"examenes/"+id),(snap)=>{
        renderExams(snap.val());
    });

    /* CHAT */
    onValue(ref(db,"chats/"+id),(snap)=>{
        renderChat(snap.val());
    });
}

/* ===== RENDER ===== */

function renderExams(data){
    const cont = $("exams");
    cont.innerHTML="";

    if(!data){
        cont.innerHTML="Sin exámenes";
        return;
    }

    Object.values(data)
    .sort((a,b)=>b.fecha-a.fecha)
    .forEach(e=>{
        const div = document.createElement("div");
        div.className="exam";

        const nota = parseFloat(e.nota);
        if(!isNaN(nota)){
            div.classList.add(nota>=5?"apto":"noapto");
        }

        div.innerHTML = `
            <strong>${e.titulo}</strong>
            <div>${e.dept}</div>
            <div>Nota: ${e.nota || "PND"}</div>
            ${!e.nota ? `<a href="${e.url}" target="_blank">Ir</a>`:""}
        `;

        cont.appendChild(div);
    });
}

function renderChat(data){
    const box = $("chat");
    box.innerHTML="";

    if(!data) return;

    Object.values(data)
    .sort((a,b)=>a.fecha-b.fecha)
    .forEach(m=>{
        const div = document.createElement("div");
        div.className = "msg " + (m.autor==="profesor"?"prof":"alum");

        div.innerText = `[${new Date(m.fecha).toLocaleTimeString()}] ${m.texto}`;

        box.appendChild(div);
    });

    box.scrollTop = box.scrollHeight;
}

/* ===== CHAT SEND ===== */

window.send = async ()=>{
    const input = $("msg");

    if(!input.value.trim() || !uid) return;

    await push(ref(db,"chats/"+uid),{
        texto: clean(input.value),
        autor:"alumno",
        fecha:Date.now()
    });

    input.value="";
};

</script>

</body>
</html>
