<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager - Mi Área de Estudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--primary); 
            margin: 0; 
        }

        #login-screen {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }

        .login-card {
            background: white; padding: 40px; border-radius: 24px;
            width: 100%; max-width: 350px; text-align: center;
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; display: none; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-top: 20px; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .grid-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; }

        /* Estilos Oposiciones */
        .timer-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white; border: none; text-align: center;
        }

        .roadmap-card { border-left: 5px solid var(--accent); background: #f8fafc; }

        /* Lista de Tareas */
        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; border-bottom: 1px solid var(--border);
        }
        .task-item:last-child { border-bottom: none; }

        .badge { padding: 5px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-done { background: #dcfce7; color: #166534; }

        /* Chat */
        #chat-display { height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 0.9rem; max-width: 85%; }
        .msg-alum { align-self: flex-end; background: var(--accent); color: white; }
        .msg-prof { align-self: flex-start; background: #e2e8f0; color: var(--primary); }

        .btn {
            padding: 12px 20px; border-radius: 12px; border: none; font-weight: 600;
            cursor: pointer; transition: 0.2s; text-decoration: none; display: inline-block;
        }
        .btn-primary { background: var(--accent); color: white; }
        .input-style {
            width: 100%; padding: 12px; border: 1px solid var(--border);
            border-radius: 10px; margin-bottom: 15px; font-family: inherit;
        }

        @media (max-width: 850px) { .grid-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <!-- ACCESO ALUMNO -->
    <div id="login-screen">
        <div class="login-card">
            <i class="fas fa-user-graduate fa-3x" style="color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Mi Portal de Estudio</h2>
            <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">Introduce tu ID de Alumno</p>
            <input type="text" id="alumno_id_input" class="input-style" placeholder="Ej: ALUM-001">
            <button class="btn btn-primary" style="width: 100%;" onclick="acceder()">Entrar al Panel</button>
        </div>
    </div>

    <!-- PANEL PRINCIPAL -->
    <div class="container" id="panel-alumno">
        <header>
            <div>
                <h1 id="welcome-msg" style="font-size: 1.5rem; margin: 0;">¡Hola! 👋</h1>
                <p id="student-id-display" style="color: #64748b; margin: 5px 0 0 0;"></p>
            </div>
            <button onclick="location.reload()" class="btn" style="background: #e2e8f0;">Salir</button>
        </header>

        <!-- ANUNCIO GLOBAL -->
        <div id="global-alert" class="card" style="display: none; background: #fffbeb; border-color: #fcd34d;">
            <div style="display: flex; gap: 15px; align-items: center;">
                <i class="fas fa-bullhorn" style="color: #d97706;"></i>
                <p id="announcement-text" style="margin: 0; font-weight: 600; color: #92400e;"></p>
            </div>
        </div>

        <div class="grid-layout">
            <!-- COLUMNA PRINCIPAL -->
            <div class="main-col">
                <!-- MI PLANIFICACIÓN -->
                <div class="card roadmap-card">
                    <h3 style="margin-top: 0;"><i class="fas fa-map-signs" style="color: var(--accent);"></i> Mi Hoja de Ruta Semanal</h3>
                    <div id="roadmap-content" style="line-height: 1.6; color: #334155; white-space: pre-wrap;">No hay objetivos asignados para esta semana.</div>
                </div>

                <!-- EXÁMENES Y TAREAS -->
                <div class="card">
                    <h3><i class="fas fa-list-check" style="color: var(--success);"></i> Mis Tareas y Exámenes</h3>
                    <div id="tasks-container"></div>
                </div>
            </div>

            <!-- COLUMNA LATERAL -->
            <div class="side-col">
                <!-- CUENTA ATRÁS -->
                <div class="card timer-gradient">
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8;">Tiempo para el Examen</p>
                    <div style="display: flex; justify-content: center; gap: 20px; margin: 15px 0;">
                        <div>
                            <div id="d-days" style="font-size: 2rem; font-weight: 800;">00</div>
                            <span style="font-size: 0.6rem; opacity: 0.7;">DÍAS</span>
                        </div>
                        <div>
                            <div id="d-hours" style="font-size: 2rem; font-weight: 800;">00</div>
                            <span style="font-size: 0.6rem; opacity: 0.7;">HORAS</span>
                        </div>
                    </div>
                    <p style="font-size: 0.7rem; opacity: 0.5;">Referencia España: 15:25</p>
                </div>

                <!-- CHAT CON PROFESOR -->
                <div class="card">
                    <h3><i class="fas fa-comment-dots"></i> Tutoría Directa</h3>
                    <div id="chat-display"></div>
                    <div style="display: flex; gap: 8px;">
                        <input type="text" id="msg_input" class="input-style" style="margin: 0;" placeholder="Pregunta algo..." onkeyup="if(event.key === 'Enter') enviarMensaje()">
                        <button class="btn btn-primary" onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>

                <!-- RECURSOS EXTRA -->
                <div class="card">
                    <h3><i class="fas fa-folder-open"></i> Material Extra</h3>
                    <div id="resources-list" style="font-size: 0.9rem;"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentAlumId = null;

        // --- ACCESO ---
        window.acceder = async () => {
            const id = document.getElementById('alumno_id_input').value.trim();
            if(!id) return alert("Ingresa tu ID");

            const snapshot = await get(ref(db, 'alumnos/' + id));
            if(snapshot.exists()) {
                currentAlumId = id;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel-alumno').style.display = 'block';
                document.getElementById('student-id-display').innerText = `Expediente: ${id}`;
                document.getElementById('welcome-msg').innerText = `¡Hola, ${snapshot.val().nombre}! 👋`;
                inicializarPanel(id);
            } else {
                alert("ID de alumno no encontrado");
            }
        };

        function inicializarPanel(id) {
            // 1. Cargar Anuncio
            onValue(ref(db, 'config/anuncio_global'), (snap) => {
                if(snap.exists() && snap.val().texto) {
                    document.getElementById('global-alert').style.display = 'block';
                    document.getElementById('announcement-text').innerText = snap.val().texto;
                }
            });

            // 2. Cargar Hoja de Ruta (Planificación)
            onValue(ref(db, 'planificacion/' + id), (snap) => {
                if(snap.exists()) document.getElementById('roadmap-content').innerText = snap.val().objetivos;
            });

            // 3. Cargar Tareas y Notas
            onValue(ref(db, 'examenes/' + id), (snap) => {
                const container = document.getElementById('tasks-container');
                container.innerHTML = "";
                if(snap.exists()) {
                    Object.values(snap.val()).reverse().forEach(task => {
                        container.innerHTML += `
                            <div class="task-item">
                                <div>
                                    <div style="font-weight: 600;">${task.titulo}</div>
                                    <div style="font-size: 0.8rem; color: #64748b;">${task.nota ? 'Nota: ' + task.nota : 'Pendiente de realizar'}</div>
                                    ${task.comentario ? `<div style="font-size: 0.75rem; color: var(--accent); margin-top:4px;">💬 ${task.comentario}</div>` : ''}
                                </div>
                                <div>
                                    ${task.nota 
                                        ? `<span class="badge badge-done">COMPLETADO</span>` 
                                        : `<a href="${task.url}" target="_blank" class="btn btn-primary" style="font-size: 0.7rem; padding: 8px 12px;">HACER EXAMEN</a>`
                                    }
                                </div>
                            </div>
                        `;
                    });
                } else {
                    container.innerHTML = "<p style='color:#94a3b8; text-align:center;'>No tienes tareas asignadas aún.</p>";
                }
            });

            // 4. Chat
            onValue(ref(db, 'chats/' + id), (snap) => {
                const box = document.getElementById('chat-display');
                box.innerHTML = "";
                if(snap.exists()) {
                    Object.values(snap.val()).forEach(m => {
                        box.innerHTML += `<div class="msg ${m.autor === 'profesor' ? 'msg-prof' : 'msg-alum'}">${m.texto}</div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });

            // 5. Recursos
            onValue(ref(db, 'recursos/' + id), (snap) => {
                const list = document.getElementById('resources-list');
                list.innerHTML = "";
                if(snap.exists()) {
                    Object.values(snap.val()).forEach(r => {
                        list.innerHTML += `<a href="${r.url}" target="_blank" style="display:block; padding:10px; background:#f1f5f9; margin-bottom:5px; border-radius:8px; text-decoration:none; color:var(--primary);"><i class="fas fa-file-download" style="margin-right:10px; color:var(--accent);"></i> ${r.nombre}</a>`;
                    });
                }
            });
        }

        window.enviarMensaje = async () => {
            const input = document.getElementById('msg_input');
            if(input.value.trim() && currentAlumId) {
                await push(ref(db, 'chats/' + currentAlumId), {
                    texto: input.value,
                    autor: "alumno",
                    fecha: Date.now()
                });
                input.value = "";
            }
        };

        // --- CONTADOR ---
        function updateTimer() {
            const target = new Date("June 15, 2026 09:00:00").getTime();
            const now = new Date().getTime();
            const diff = target - now;
            document.getElementById('d-days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('d-hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        }
        setInterval(updateTimer, 60000); updateTimer();

    </script>
</body>
</html>
