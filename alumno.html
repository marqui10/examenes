<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Alumno - Examen</title>
    
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        body { font-family: sans-serif; margin: 0; background: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; }
        .login-box { background: white; color: #333; padding: 40px; border-radius: 15px; margin-top: 100px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ccc; margin-bottom: 10px; width: 250px; display: block; margin-left: auto; margin-right: auto; }
        button { padding: 12px 30px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #visor-container { display: none; width: 100%; height: 100vh; }
        iframe { width: 100%; height: 100%; border: none; background: white; }
    </style>
</head>
<body>

<div id="auth" class="login-box">
    <h2 style="margin-top:0;">Mi Aula Virtual</h2>
    <p>Introduce tu código personal:</p>
    <input type="text" id="miID" placeholder="Tu ID (ej: MARCOS01)">
    <button onclick="entrarAlExamen()">ENTRAR AL EXAMEN</button>
</div>

<div id="visor-container">
    <iframe id="iframeExamen" src="about:blank"></iframe>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
        authDomain: "://firebaseapp.com",
        databaseURL: "https://firebasedatabase.app",
        projectId: "examenes-profesoralumno",
        storageBucket: "examenes-profesoralumno.firebasestorage.app",
        messagingSenderId: "503796832177",
        appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function entrarAlExamen() {
        const id = document.getElementById('miID').value.trim();
        if (!id) return alert("Escribe tu código.");

        // Escuchar cambios en la ruta del alumno
        db.ref('examenes/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('auth').style.display = 'none';
                document.getElementById('visor-container').style.display = 'block';
                document.getElementById('iframeExamen').src = data.url;
            } else {
                alert("No se encontró ningún examen para el código: " + id);
            }
        });
    }
</script>
</body>
</html>
