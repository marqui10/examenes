<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Profesor - Firebase</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #0056b3; }
        .status { text-align: center; margin-top: 15px; color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Panel del Profesor</h2>
    <p>Asignar nuevo examen</p>
    <input type="text" id="id_alumno" placeholder="ID del Alumno">
    <input type="text" id="titulo" placeholder="Título del Examen">
    <input type="url" id="url" placeholder="URL de Google Forms">
    <button id="btnGuardar">Guardar Examen</button>
    <div id="mensaje" class="status"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
        authDomain: "examenes-profesoralumno.firebaseapp.com",
        databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "examenes-profesoralumno",
        storageBucket: "examenes-profesoralumno.firebasestorage.app",
        messagingSenderId: "503796832177",
        appId: "1:503796832177:web:b306d6971c8ed7a9becf90",
        measurementId: "G-2662GS0WE7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    document.getElementById('btnGuardar').onclick = async () => {
        const id = document.getElementById('id_alumno').value.trim();
        const titulo = document.getElementById('titulo').value.trim();
        const url = document.getElementById('url').value.trim();

        if(!id || !titulo || !url) return alert("Completa todos los campos");

        // 1. Asegurar que el alumno existe en la base de datos
        await set(ref(db, 'alumnos/' + id), { activo: true });

        // 2. Añadir el examen a la lista de ese alumno
        const examenesRef = ref(db, 'examenes/' + id);
        await push(examenesRef, {
            titulo: titulo,
            url: url,
            fecha: new Date().toISOString()
        });

        document.getElementById('mensaje').innerText = "Examen enviado correctamente";
        document.querySelectorAll('input').forEach(i => i.value = "");
        setTimeout(() => document.getElementById('mensaje').innerText = "", 3000);
    };
</script>

</body>
</html>
