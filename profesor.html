<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - Enviar Examen</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 40px; background: #fdf2f2; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #d9534f; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>Panel Profesor</h2>
    <input type="text" id="idAlumno" placeholder="ID del Alumno">
    <input type="url" id="linkExamen" placeholder="Enlace de Google Forms">
    <button onclick="enviarExamen()">ENVIAR EXAMEN</button>
    <p id="status"></p>
</div>

<script>
    async function enviarExamen() {
        const id = document.getElementById('idAlumno').value.trim();
        const url = document.getElementById('linkExamen').value.trim();
        const status = document.getElementById('status');

        if (!id || !url) return alert("Rellena los campos");

        status.innerText = "Enviando...";
        status.style.color = "blue";

        // URL directa a tu base de datos (REST API)
        const dbURL = `https://firebasedatabase.app{id}.json`;

        try {
            const response = await fetch(dbURL, {
                method: 'PUT',
                body: JSON.stringify({ url: url }),
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                status.innerText = "✅ ¡Enviado con éxito!";
                status.style.color = "green";
            } else {
                status.innerText = "❌ Error en el servidor";
                status.style.color = "red";
            }
        } catch (error) {
            status.innerText = "❌ Error de conexión";
            status.style.color = "red";
        }
    }
</script>
</body>
</html>
