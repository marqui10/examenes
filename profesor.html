<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.E. v4.0 - Panel de Administración Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #05070a; --bg-card: #0f121a; --border: #334155;
            --accent: #3b82f6; --danger: #ef4444; --success: #10b981;
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--primary); color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #05070a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: #0a0c12; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
        }
        .nav-item {
            padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--text-dim);
            transition: 0.3s; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; font-weight: 600;
        }
        .nav-item:hover, .nav-item.active { background: rgba(59, 130, 246, 0.1); color: white; }
        .nav-item i { width: 20px; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #05070a; }
        .top-nav { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-primary { background: white; color: black; }
        .btn-discord { background: #5865F2; color: white; }

        input, select, textarea {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px; color: white; margin-bottom: 10px; box-sizing: border-box;
        }

        .timer-display { font-family: 'JetBrains Mono'; font-size: 2.5rem; color: var(--success); text-align: center; margin: 15px 0; }
        
        #clock-spain { font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card" style="width: 350px; text-align: center;">
            <h2 style="margin-bottom: 5px;">S.I.G.E.</h2>
            <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 25px;">CONTROL DE ACCESO ESTATAL</p>
            <button class="btn btn-discord" style="width: 100%;" onclick="loginDiscord()">
                <i class="fab fa-discord"></i> ENTRAR CON DISCORD
            </button>
            <p id="auth-status" style="margin-top: 15px; font-size: 0.7rem;"></p>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight: 800; font-size: 1.4rem; margin-bottom: 30px;">SIGE <span style="font-weight:300; font-size: 0.8rem;">ADMIN</span></div>
        <div class="nav-item active" onclick="showView('general')"><i class="fas fa-home"></i> General</div>
        <hr style="border:0; border-top: 1px solid var(--border); margin: 10px 0;">
        <div class="nav-item" onclick="accessCuerpo('CNP')"><i class="fas fa-shield-alt"></i> C.N.P.</div>
        <div class="nav-item" onclick="accessCuerpo('GC')"><i class="fas fa-horse"></i> G. Civil</div>
        <div class="nav-item" onclick="accessCuerpo('BOMBEROS')"><i class="fas fa-fire"></i> Bomberos</div>
        <div class="nav-item" onclick="accessCuerpo('DGT')"><i class="fas fa-car"></i> D.G.T.</div>
        <div class="nav-item" onclick="accessCuerpo('SANITARIOS')"><i class="fas fa-heartbeat"></i> Sanitarios</div>
    </div>

    <div class="main-content">
        <nav class="top-nav">
            <div><i class="fas fa-map-marker-alt"></i> ESPAÑA: <span id="clock-spain">--:--:--</span></div>
            <div id="user-info" style="font-size: 0.8rem; font-weight: bold;"></div>
        </nav>

        <div class="container" id="view-general">
            <div class="card">
                <h3><i class="fas fa-bullhorn"></i> Crear Aviso General</h3>
                <textarea id="global-notice" placeholder="Escribe un aviso para todos los alumnos..."></textarea>
                <button class="btn btn-primary" onclick="postNotice()">PUBLICAR AVISO</button>
            </div>

            <div class="card">
                <h3><i class="fas fa-user-tag"></i> Asignación de Rama</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="assign-user-id" placeholder="ID Discord Alumno" style="margin:0;">
                    <select id="assign-cuerpo" style="margin:0;">
                        <option value="CNP">CNP</option>
                        <option value="GC">G. Civil</option>
                        <option value="BOMBEROS">Bomberos</option>
                    </select>
                    <button class="btn btn-primary" onclick="assignUser()">ASIGNAR</button>
                </div>
            </div>
        </div>

        <div class="container" id="view-cuerpo" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="cuerpo-title">NOMBRE CUERPO</h2>
                <button class="btn btn-danger" onclick="showView('general')">SALIR</button>
            </div>

            <div class="grid" style="display: grid; grid-template-columns: 1fr 350px; gap: 20px;">
                <div class="left">
                    <div class="card">
                        <h3><i class="fas fa-stopwatch"></i> Control de Tiempo Rama</h3>
                        <div class="timer-display" id="timer-val">00:00:00</div>
                        <div style="display: flex; gap: 10px;">
                            <input type="datetime-local" id="target-time" style="margin:0;">
                            <button class="btn btn-primary" onclick="startGlobalTimer()">SINCRONIZAR HORA</button>
                        </div>
                    </div>

                    <div class="card">
                        <h3><i class="fas fa-users"></i> Expedientes de la Rama</h3>
                        <div id="alumno-list">
                            </div>
                    </div>
                </div>

                <div class="right">
                    <div class="card">
                        <h3><i class="fas fa-comments"></i> Chat de Rama</h3>
                        <div id="cuerpo-chat" style="height: 300px; overflow-y: auto; background:#000; padding:10px; border-radius:8px; font-size:0.8rem; margin-bottom:10px;"></div>
                        <input type="text" id="cuerpo-chat-input" placeholder="Mensaje a la rama...">
                        <button class="btn btn-primary" style="width: 100%;" onclick="sendCuerpoChat()">ENVIAR</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentCuerpo = "";
        let currentUser = null;

        // --- AUTENTICACIÓN DISCORD ---
        const CLIENT_ID = '1500201403484737616'; 
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        window.loginDiscord = () => {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        };

        async function checkAuth() {
            const params = new URLSearchParams(window.location.hash.substring(1));
            const token = params.get('access_token');
            if (token) {
                document.getElementById('auth-status').innerText = "VERIFICANDO PERMISOS...";
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                const user = await res.json();
                
                // Verificar en Firebase si es Admin
                const snap = await get(ref(db, `config/admins_autorizados/${user.username}`));
                if (snap.exists() && snap.val().activo === true) {
                    currentUser = user;
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('user-info').innerText = `INSTRUCTOR: ${user.username.toUpperCase()}`;
                    window.history.replaceState({}, document.title, window.location.pathname);
                } else {
                    document.getElementById('auth-status').innerHTML = `<span style="color:var(--danger)">NO TIENES PERMISOS DE ADMIN</span>`;
                }
            }
        }

        // --- SEGURIDAD POR CUERPO ---
        window.accessCuerpo = async (cuerpo) => {
            const pass = prompt(`Introduce la contraseña de acceso para ${cuerpo}:`);
            const snap = await get(ref(db, `config/passwords/${cuerpo}`));
            
            if (snap.exists() && snap.val() === pass) {
                currentCuerpo = cuerpo;
                openCuerpoView(cuerpo);
            } else {
                alert("Contraseña incorrecta.");
            }
        };

        function openCuerpoView(cuerpo) {
            document.getElementById('view-general').style.display = 'none';
            document.getElementById('view-cuerpo').style.display = 'block';
            document.getElementById('cuerpo-title').innerText = `PANEL DE CONTROL - ${cuerpo}`;
            
            // Sincronizar Temporizador del Cuerpo
            onValue(ref(db, `timers/${cuerpo}`), (snap) => {
                if(snap.exists()) {
                    document.getElementById('timer-val').innerText = snap.val().display || "00:00:00";
                }
            });

            // Cargar alumnos asignados a esta rama
            onValue(ref(db, 'estudiantes_registrados'), (snap) => {
                const list = document.getElementById('alumno-list');
                list.innerHTML = "";
                if(snap.exists()){
                    Object.entries(snap.val()).forEach(([id, info]) => {
                        if(info.cuerpo === cuerpo) {
                            list.innerHTML += `
                                <div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:10px 20px;">
                                    <span><b>${info.nombre}</b> (@${id})</span>
                                    <button class="btn btn-primary" onclick="alert('Abriendo expediente de ${id}')">VER EXPEDIENTE</button>
                                </div>`;
                        }
                    });
                }
            });
        }

        window.showView = (view) => {
            document.getElementById('view-general').style.display = view === 'general' ? 'block' : 'none';
            document.getElementById('view-cuerpo').style.display = view === 'cuerpo' ? 'block' : 'none';
        };

        // --- FUNCIONES GENERALES ---
        window.postNotice = () => {
            const msg = document.getElementById('global-notice').value;
            set(ref(db, 'avisos_globales'), {
                text: msg,
                author: currentUser.username,
                time: Date.now()
            }).then(() => alert("Aviso publicado a todos los alumnos."));
        };

        window.assignUser = () => {
            const id = document.getElementById('assign-user-id').value;
            const cuerpo = document.getElementById('assign-cuerpo').value;
            update(ref(db, `estudiantes_registrados/${id}`), { cuerpo: cuerpo });
            alert(`Usuario ${id} movido a ${cuerpo}`);
        };

        window.startGlobalTimer = () => {
            const target = document.getElementById('target-time').value;
            if(!target) return;
            set(ref(db, `timers/${currentCuerpo}`), {
                target: new Date(target).getTime(),
                active: true
            });
        };

        // Reloj España
        setInterval(() => {
            const now = new Intl.DateTimeFormat('es-ES', { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(new Date());
            document.getElementById('clock-spain').innerText = now;
        }, 1000);

        checkAuth();
    </script>
</body>
</html>
