<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManager Pro - Panel de Control</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--primary); 
            margin: 0; 
            display: flex;
            min-height: 100vh;
        }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--primary);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 24px;
            width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
        }

        #main-content-wrapper { display: none; width: 100%; }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background: var(--primary); color: white;
            padding: 30px 20px; display: flex; flex-direction: column; gap: 20px;
            height: 100vh; position: fixed;
        }
        .sidebar h1 { font-size: 1.2rem; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 300px); }

        /* --- UI COMPONENTS --- */
        .header-title { margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; align-items: start; }

        .card {
            background: var(--card-bg); border-radius: 20px; padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .card h3 { margin: 0 0 20px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 10px; }

        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.8rem; font-weight: 600; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
        
        input, textarea {
            width: 100%; padding: 12px 16px; border: 1px solid var(--border);
            border-radius: 12px; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: 600; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

        /* --- EXAM CARDS --- */
        .exam-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 15px; }
        .exam-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-badge { padding: 4px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-graded { background: #dcfce7; color: #166534; }
        .grade-controls { display: grid; grid-template-columns: 80px 1fr 50px; gap: 10px; padding-top: 15px; border-top: 1px solid #f1f5f9; }

        /* --- INTERACTION --- */
        #chat-box { height: 250px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; background: #fdfdfd; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 0.85rem; }
        .msg-prof { align-self: flex-end; background: var(--accent); color: white; }
        .msg-alum { align-self: flex-start; background: #f1f5f9; border: 1px solid var(--border); }

        .alum-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        .btn-delete { color: #ef4444; cursor: pointer; }
        .hidden { display: none !important; }

        @media (max-width: 1000px) {
            .grid { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .main-content { margin-left: 0; width: 100%; padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="login-overlay">
        <div class="login-box">
            <i class="fas fa-user-shield fa-3x" style="color: var(--accent); margin-bottom: 20px;"></i>
            <h2>Panel Administrativo</h2>
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="user_login" placeholder="Usuario">
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="pass_login" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="verificarAcceso()">Entrar</button>
            <p id="error-login" style="color: #ef4444; display: none; margin-top: 15px; font-size: 0.85rem;">Credenciales incorrectas</p>
        </div>
    </div>

    <div id="main-content-wrapper">
        <aside class="sidebar">
            <h1><i class="fas fa-graduation-cap"></i> EduManager</h1>
            <div style="margin-top: auto; font-size: 0.8rem; opacity: 0.6;">
                <p><i class="fas fa-circle" style="color: var(--success); font-size: 0.6rem;"></i> Sesión: Profesor</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="header-title">
                <div>
                    <h2>Panel del Instructor</h2>
                    <p>Gestión de contenidos y seguimiento de alumnos.</p>
                </div>
                <button class="btn" style="width: auto; background: #e2e8f0;" onclick="location.reload()">Cerrar Sesión</button>
            </header>

            <!-- ANUNCIO GLOBAL -->
            <div class="card" style="padding: 20px; border-left: 5px solid var(--warning);">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <i class="fas fa-bullhorn fa-lg" style="color: var(--warning)"></i>
                    <input type="text" id="global_announcement" placeholder="Anuncio general para todos..." style="border:none;">
                    <button class="btn btn-primary" style="width: 120px; padding: 10px;" onclick="publicarAnuncio()">Publicar</button>
                </div>
            </div>

            <div class="grid">
                <!-- COLUMNA IZQUIERDA -->
                <div class="col-left">
                    <div class="card">
                        <h3><i class="fas fa-paper-plane" style="color: var(--accent)"></i> Nueva Tarea</h3>
                        <div class="form-group">
                            <label>ID Alumno</label>
                            <input type="text" id="id_alumno" placeholder="ALUM-001">
                        </div>
                        <div class="form-group">
                            <label>Nombre del Examen</label>
                            <input type="text" id="titulo_examen" placeholder="Tema 1: Intro">
                        </div>
                        <div class="form-group">
                            <label>Enlace Forms</label>
                            <input type="url" id="url_examen" placeholder="https://forms.gle/...">
                        </div>
                        <button class="btn btn-primary" onclick="crearExamen()">Asignar Examen</button>
                        <div id="notif" style="display:none; margin-top:15px; text-align:center; color: var(--success);">¡Asignado!</div>
                    </div>

                    <!-- CUENTA ATRÁS -->
                    <div class="card" style="background: var(--primary); color: white; border: none;">
                        <h3 style="color: #94a3b8; font-size: 0.8rem;"><i class="fas fa-stopwatch"></i> TIEMPO A EXAMEN</h3>
                        <div style="display: flex; justify-content: space-around; text-align: center; margin-top: 10px;">
                            <div><div id="days-left" style="font-size: 1.8rem; font-weight: 800; color: var(--accent);">--</div><small>DÍAS</small></div>
                            <div><div id="hours-left" style="font-size: 1.8rem; font-weight: 800;">--</div><small>HORAS</small></div>
                        </div>
                    </div>
                </div>

                <!-- COLUMNA DERECHA -->
                <div class="col-right">
                    <div class="card">
                        <h3><i class="fas fa-clipboard-check" style="color: var(--warning)"></i> Centro de Calificaciones</h3>
                        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                            <input type="text" id="search_id" placeholder="Buscar ID Alumno..." onkeyup="if(event.key==='Enter') buscarAlumno()">
                            <button class="btn btn-primary" style="width: 120px;" onclick="buscarAlumno()">Buscar</button>
                        </div>
                        
                        <div id="stats-container" class="hidden">
                            <div style="display: flex; justify-content: space-around; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border);">
                                <div style="text-align:center;"><small>Promedio</small><div id="avg-grade" style="font-weight:800; color:var(--accent);">0.0</div></div>
                                <div style="text-align:center;"><small>Tareas</small><div id="total-tasks" style="font-weight:800;">0</div></div>
                                <div style="width: 40%; align-self:center;"><div style="height:8px; background:#e2e8f0; border-radius:4px; overflow:hidden;"><div id="progress-bar" style="height:100%; background:var(--success); width:0%;"></div></div></div>
                            </div>
                        </div>
                        <div id="contenedorExamenes"></div>
                    </div>

                    <!-- TABS INTERACCIÓN -->
                    <div class="card" id="panel-interaccion" style="display: none;">
                        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                            <button class="btn" onclick="switchTab('chat')" id="btn-tab-chat" style="background: var(--accent); color: white;">Chat</button>
                            <button class="btn" onclick="switchTab('plan')" id="btn-tab-plan" style="background: #e2e8f0;">Planificación</button>
                            <button class="btn" onclick="switchTab('links')" id="btn-tab-links" style="background: #e2e8f0;">Material</button>
                        </div>

                        <div id="tab-chat">
                            <div id="chat-box"></div>
                            <div style="display: flex; gap: 8px;">
                                <input type="text" id="chat_input" placeholder="Escribe al alumno...">
                                <button class="btn btn-primary" style="width: 60px;" onclick="enviarMensaje()"><i class="fas fa-paper-plane"></i></button>
                            </div>
                        </div>

                        <div id="tab-plan" style="display: none;">
                            <textarea id="plan_text" rows="5" placeholder="Objetivos semanales..."></textarea>
                            <button class="btn btn-primary" onclick="guardarPlanificacion()" style="margin-top:10px;">Actualizar Plan</button>
                            <div id="plan-status" style="margin-top:10px; font-size:0.8rem; color:var(--success); display:none;">¡Actualizado!</div>
                        </div>

                        <div id="tab-links" style="display: none;">
                            <input type="text" id="link_name" placeholder="Nombre del recurso" style="margin-bottom:10px;">
                            <input type="url" id="link_url" placeholder="https://..." style="margin-bottom:10px;">
                            <button class="btn btn-primary" onclick="guardarEnlace()">Compartir Link</button>
                            <div id="lista-enlaces" style="margin-top:15px;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GESTIÓN ALUMNOS -->
            <div class="card" style="margin-top: 30px;">
                <h3><i class="fas fa-users" style="color: var(--accent)"></i> Gestión de la Clase</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                    <div>
                        <label>Nuevo Alumno</label>
                        <div style="display: flex; gap: 10px; margin-top: 10px;">
                            <input type="text" id="new_alum_name" placeholder="Nombre completo">
                            <input type="text" id="new_alum_id" placeholder="ID">
                            <button class="btn btn-primary" style="width: 60px;" onclick="registrarAlumno()"><i class="fas fa-user-plus"></i></button>
                        </div>
                    </div>
                    <div>
                        <label>Alumnos Activos</label>
                        <div id="lista-alumnos-registrados" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 12px; margin-top: 10px;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, update, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let alumnoActivo = null;

        // LOGIN
        window.verificarAcceso = async () => {
            const u = document.getElementById('user_login').value.trim();
            const p = document.getElementById('pass_login').value.trim();
            const snap = await get(ref(db, 'config/admin'));
            if (snap.exists() && u === snap.val().usuario && p === snap.val().password) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content-wrapper').style.display = 'block';
            } else { document.getElementById('error-login').style.display = 'block'; }
        };

        // CUENTA ATRÁS
        function actualizarReloj() {
            const target = new Date("April 2, 2026 16:50:00").getTime();
            const diff = target - new Date().getTime();
            document.getElementById("days-left").innerText = Math.floor(diff / (1000*60*60*24));
            document.getElementById("hours-left").innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
        }
        setInterval(actualizarReloj, 60000); actualizarReloj();

        // BÚSQUEDA Y CALIFICACIONES
        window.buscarAlumno = () => {
            const id = document.getElementById('search_id').value.trim();
            if(!id) return;
            alumnoActivo = id;
            document.getElementById('panel-interaccion').style.display = 'block';
            cargarChat(id); listarEnlaces(id); cargarPlanificacion(id);

            onValue(ref(db, 'examenes/' + id), (snap) => {
                const data = snap.val();
                const container = document.getElementById('contenedorExamenes');
                const stats = document.getElementById('stats-container');
                container.innerHTML = "";
                if(!data) { stats.classList.add('hidden'); return; }
                stats.classList.remove('hidden');
                let suma = 0, cont = 0;
                Object.entries(data).forEach(([key, ex]) => {
                    if(ex.nota) { suma += parseFloat(ex.nota); cont++; }
                    container.innerHTML += `<div class="exam-card">
                        <div class="exam-info"><h4>${ex.titulo}</h4><span class="status-badge ${ex.nota ? 'status-graded':'status-pending'}">${ex.nota ? 'Nota: '+ex.nota : 'Pendiente'}</span></div>
                        <div class="grade-controls">
                            <input type="number" class="input-grade" id="n_${key}" value="${ex.nota || ''}">
                            <input type="text" id="c_${key}" value="${ex.comentario || ''}" placeholder="Feedback">
                            <button class="btn btn-primary" onclick="guardarNota('${id}','${key}')"><i class="fas fa-save"></i></button>
                        </div></div>`;
                });
                const prom = cont > 0 ? (suma/cont).toFixed(1) : 0;
                document.getElementById('avg-grade').innerText = prom;
                document.getElementById('total-tasks').innerText = Object.keys(data).length;
                document.getElementById('progress-bar').style.width = (prom * 10) + "%";
            });
        };

        window.guardarNota = async (a, e) => {
            await update(ref(db, `examenes/${a}/${e}`), { 
                nota: document.getElementById(`n_${e}`).value, 
                comentario: document.getElementById(`c_${e}`).value 
            });
            alert("Nota actualizada");
        };

        // GESTIÓN ALUMNOS
        window.registrarAlumno = async () => {
            const n = document.getElementById('new_alum_name').value;
            const id = document.getElementById('new_alum_id').value;
            if(n && id) await set(ref(db, 'estudiantes_registrados/' + id), { nombre: n });
        };

        onValue(ref(db, 'estudiantes_registrados'), (snap) => {
            const list = document.getElementById('lista-alumnos-registrados');
            list.innerHTML = "";
            if(snap.exists()) Object.entries(snap.val()).forEach(([id, info]) => {
                list.innerHTML += `<div class="alum-item"><span>${id} - ${info.nombre}</span><i class="fas fa-trash btn-delete" onclick="eliminarAlumno('${id}')"></i></div>`;
            });
        });

        window.eliminarAlumno = async (id) => { if(confirm("¿Borrar?")) await remove(ref(db, 'estudiantes_registrados/'+id)); };

        // TABS Y CHAT
        window.switchTab = (tab) => {
            ['chat', 'links', 'plan'].forEach(t => {
                document.getElementById(`tab-${t}`).style.display = t === tab ? 'block' : 'none';
                document.getElementById(`btn-tab-${t}`).style.background = t === tab ? 'var(--accent)' : '#e2e8f0';
                document.getElementById(`btn-tab-${t}`).style.color = t === tab ? 'white' : 'var(--primary)';
            });
        };

        function cargarChat(id) {
            onValue(ref(db, 'chats/' + id), (snap) => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                if(snap.exists()) Object.values(snap.val()).forEach(m => {
                    box.innerHTML += `<div class="msg ${m.autor==='profesor'?'msg-prof':'msg-alum'}">${m.texto}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        window.enviarMensaje = async () => {
            const input = document.getElementById('chat_input');
            if(input.value && alumnoActivo) {
                await push(ref(db, 'chats/' + alumnoActivo), { texto: input.value, autor: "profesor" });
                input.value = "";
            }
        };

        // OTROS
        window.publicarAnuncio = async () => { await set(ref(db, 'config/anuncio_global'), { texto: document.getElementById('global_announcement').value }); alert("Anuncio publicado"); };
        
        window.crearExamen = async () => {
            const id = document.getElementById('id_alumno').value;
            await push(ref(db, 'examenes/' + id), { 
                titulo: document.getElementById('titulo_examen').value, 
                url: document.getElementById('url_examen').value 
            });
            document.getElementById('notif').style.display='block';
        };

        window.guardarPlanificacion = async () => {
            await set(ref(db, 'planificacion/' + alumnoActivo), { objetivos: document.getElementById('plan_text').value });
            document.getElementById('plan-status').style.display='block';
        };

        async function cargarPlanificacion(id) {
            const snap = await get(ref(db, 'planificacion/' + id));
            document.getElementById('plan_text').value = snap.exists() ? snap.val().objetivos : "";
        }

        window.guardarEnlace = async () => {
            await push(ref(db, 'recursos/' + alumnoActivo), { 
                nombre: document.getElementById('link_name').value, 
                url: document.getElementById('link_url').value 
            });
        };

        function listarEnlaces(id) {
            onValue(ref(db, 'recursos/' + id), (snap) => {
                const list = document.getElementById('lista-enlaces'); list.innerHTML = "";
                if(snap.exists()) Object.values(snap.val()).forEach(i => {
                    list.innerHTML += `<div style="background:#f1f5f9; padding:10px; border-radius:8px; margin-bottom:5px; display:flex; justify-content:space-between;"><span>${i.nombre}</span><a href="${i.url}" target="_blank">Ver</a></div>`;
                });
            });
        }
    </script>
</body>
</html>
