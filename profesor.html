<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.E. - Gestión Administrativa Estatal (ADMIN)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #05070a;
            --bg-card: #0f121a;
            --border: #334155;
            --accent-cnp: #1e40af;
            --accent-gc: #064e3b;
            --accent-fire: #991b1b;
            --accent-ems: #0891b2;
            --accent-dgt: #854d0e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--primary); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #05070a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .main-view { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav {
            padding: 15px 40px; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }

        .container { padding: 30px 40px; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 400px 1fr; gap: 30px; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .card h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

        input, select, textarea {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px; color: white; font-size: 0.9rem; margin-bottom: 12px; box-sizing: border-box;
        }

        .btn {
            padding: 10px 15px; border-radius: 8px; border: none; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.65rem;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: white; color: black; }
        .btn-timer { background: #1e293b; color: #94a3b8; border: 1px solid var(--border); }
        .btn-timer.active { background: var(--danger); color: white; border-color: var(--danger); }

        .timer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .timer-box { background: #000; border: 1px solid var(--border); padding: 10px; border-radius: 8px; text-align: center; }
        .timer-display { font-family: 'JetBrains Mono'; font-size: 1.2rem; color: var(--success); display: block; margin-top: 5px; }

        .exam-row { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        
        .censo-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(51, 65, 85, 0.3);
        }

        #clock { font-family: 'JetBrains Mono'; color: var(--text-main); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="text-align: center; background: var(--bg-card); padding: 40px; border-radius: 20px; border: 1px solid var(--border);">
            <h2 style="margin-bottom: 20px;">S.I.G.E. ADMIN</h2>
            <button class="btn btn-primary" style="width: 100%; padding: 15px;" onclick="loginDiscord()">AUTENTICAR CON DISCORD</button>
            <p id="status-msg" style="font-size: 0.7rem; margin-top: 15px; color: var(--text-dim);"></p>
        </div>
    </div>

    <div class="main-view">
        <nav class="top-nav">
            <div style="display: flex; gap: 20px; align-items: center;">
                <div style="font-weight: 800; font-size: 1.2rem;">S.I.G.E. <span style="color:var(--text-dim)">ADMIN</span></div>
                <div style="font-size: 0.8rem; opacity: 0.6;"><i class="fas fa-clock"></i> <span id="clock">--:--:--</span></div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search_id" placeholder="ID del Alumno..." style="width: 250px; margin:0;">
                <button class="btn btn-primary" onclick="buscarAlumno()"><i class="fas fa-search"></i> CARGAR</button>
            </div>
        </nav>

        <div class="container">
            <div class="grid">
                <div class="left-col">
                    <!-- PANEL DE TEMPORIZADORES -->
                    <div class="card">
                        <h3><i class="fas fa-stopwatch"></i> Temporizadores Globales</h3>
                        <div class="timer-grid">
                            <div class="timer-box">
                                <span style="font-size: 0.6rem;">CNP</span>
                                <span class="timer-display" id="disp-CNP">00:00</span>
                                <button class="btn btn-timer" id="btn-CNP" onclick="toggleTimer('CNP')" style="width:100%; margin-top:10px;">INICIAR</button>
                            </div>
                            <div class="timer-box">
                                <span style="font-size: 0.6rem;">G. CIVIL</span>
                                <span class="timer-display" id="disp-GC">00:00</span>
                                <button class="btn btn-timer" id="btn-GC" onclick="toggleTimer('GC')" style="width:100%; margin-top:10px;">INICIAR</button>
                            </div>
                        </div>
                        <button class="btn btn-danger" onclick="resetTimers()" style="width:100%; font-size:0.5rem;">RESETEAR TODOS LOS TIEMPOS</button>
                    </div>

                    <!-- ASIGNACIÓN DE CUERPO -->
                    <div class="card">
                        <h3><i class="fas fa-id-badge"></i> Estado del Aspirante</h3>
                        <label style="font-size: 0.6rem; color: var(--text-dim);">CUERPO ACTUAL</label>
                        <select id="set_cuerpo_activo">
                            <option value="NINGUNO">Sin Asignar</option>
                            <option value="CNP">Cuerpo Nacional de Policía</option>
                            <option value="GC">Guardia Civil</option>
                            <option value="BOMBEROS">Bomberos</option>
                            <option value="SANITARIOS">Sanitarios</option>
                        </select>
                        <button class="btn btn-primary" style="width: 100%;" onclick="actualizarCuerpo()">ACTUALIZAR CUERPO ACTIVO</button>
                    </div>

                    <div class="card">
                        <h3><i class="fas fa-plus-circle"></i> Asignar Nueva Prueba</h3>
                        <select id="reg_dept">
                            <option value="CNP">CNP</option>
                            <option value="GC">Guardia Civil</option>
                            <option value="BOMBEROS">Bomberos</option>
                        </select>
                        <input type="text" id="titulo_examen" placeholder="Nombre de la prueba">
                        <input type="url" id="url_examen" placeholder="Link (opcional)">
                        <button class="btn btn-primary" onclick="crearExamen()" style="width: 100%; background: var(--accent-cnp); color:white;">ASIGNAR AL ALUMNO</button>
                    </div>
                </div>

                <div class="right-col">
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                            <h3 style="margin:0;"><i class="fas fa-folder"></i> Expediente Académico</h3>
                            <div id="cuerpo_badge"></div>
                        </div>
                        <div id="contenedorExamenes"></div>
                    </div>

                    <div class="card">
                        <h3><i class="fas fa-users"></i> Censo de Alumnos</h3>
                        <div id="lista-censo"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, update, onValue, get, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DE TEMPORIZADORES ---
        window.toggleTimer = (dept) => {
            const btn = document.getElementById(`btn-${dept}`);
            const isActive = btn.classList.contains('active');
            
            update(ref(db, `timers/${dept}`), {
                running: !isActive,
                lastUpdate: Date.now()
            });
        };

        window.resetTimers = () => {
            const depts = ['CNP', 'GC'];
            depts.forEach(d => {
                set(ref(db, `timers/${d}`), { running: false, seconds: 0, lastUpdate: Date.now() });
            });
        };

        // Sincronización de Timers
        const depts = ['CNP', 'GC'];
        depts.forEach(dept => {
            onValue(ref(db, `timers/${dept}`), (snap) => {
                const data = snap.val() || { seconds: 0, running: false };
                const display = document.getElementById(`disp-${dept}`);
                const btn = document.getElementById(`btn-${dept}`);

                if(data.running) {
                    btn.innerText = "PARAR";
                    btn.classList.add('active');
                } else {
                    btn.innerText = "INICIAR";
                    btn.classList.remove('active');
                }

                // Cálculo de tiempo localmente para fluidez
                let currentSecs = data.seconds;
                display.innerText = formatTime(currentSecs);
            });
        });

        // Motor de incremento de tiempo (solo admin actualiza DB cada 5s para no saturar)
        setInterval(() => {
            depts.forEach(dept => {
                get(ref(db, `timers/${dept}`)).then(snap => {
                    const data = snap.val();
                    if(data && data.running) {
                        update(ref(db, `timers/${dept}`), { seconds: data.seconds + 1 });
                    }
                });
            });
        }, 1000);

        function formatTime(s) {
            const mins = Math.floor(s / 60);
            const secs = s % 60;
            return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }

        // --- GESTIÓN DE ALUMNOS ---
        window.buscarAlumno = () => {
            const id = document.getElementById('search_id').value.trim();
            if(!id) return;

            // Escuchar Cuerpo Activo
            onValue(ref(db, `users/${id}/cuerpo`), (snap) => {
                const cuerpo = snap.val() || "NINGUNO";
                const badge = document.getElementById('cuerpo_badge');
                badge.innerHTML = `<span class="tag" style="background:var(--accent-${cuerpo.toLowerCase()})">ACTIVO EN: ${cuerpo}</span>`;
                document.getElementById('set_cuerpo_activo').value = cuerpo;
            });

            // Escuchar Exámenes
            onValue(ref(db, 'examenes/' + id), (snap) => {
                const container = document.getElementById('contenedorExamenes');
                container.innerHTML = "";
                if(snap.exists()) {
                    Object.entries(snap.val()).forEach(([key, t]) => {
                        container.innerHTML += `
                        <div class="exam-row">
                            <div style="display:flex; justify-content:space-between;">
                                <b>${t.titulo}</b>
                                <span class="tag" style="background:var(--accent-${t.dept.toLowerCase()})">${t.dept}</span>
                            </div>
                            <div style="margin-top:10px; display:flex; gap:10px;">
                                <input type="text" id="n_${key}" value="${t.nota || ''}" placeholder="Nota" style="width:80px; margin:0;">
                                <input type="text" id="c_${key}" value="${t.comentario || ''}" placeholder="Obs." style="margin:0;">
                                <button class="btn btn-primary" onclick="saveGrade('${id}','${key}')"><i class="fas fa-save"></i></button>
                            </div>
                        </div>`;
                    });
                }
            });
        };

        window.actualizarCuerpo = () => {
            const id = document.getElementById('search_id').value.trim();
            const cuerpo = document.getElementById('set_cuerpo_activo').value;
            if(!id) return alert("Carga un alumno primero");
            update(ref(db, `users/${id}`), { cuerpo: cuerpo });
            alert("Cuerpo actualizado");
        };

        window.saveGrade = (aid, eid) => {
            update(ref(db, `examenes/${aid}/${eid}`), {
                nota: document.getElementById(`n_${eid}`).value,
                comentario: document.getElementById(`c_${eid}`).value
            }).then(() => alert("Guardado"));
        };

        window.crearExamen = () => {
            const id = document.getElementById('search_id').value.trim();
            if(!id) return alert("Busca un ID primero");
            push(ref(db, 'examenes/' + id), {
                titulo: document.getElementById('titulo_examen').value,
                url: document.getElementById('url_examen').value || "#",
                dept: document.getElementById('reg_dept').value,
                nota: "", comentario: ""
            });
        };

        // Censo
        onValue(ref(db, 'estudiantes_registrados'), snap => {
            const div = document.getElementById('lista-censo');
            div.innerHTML = "";
            if(snap.exists()){
                Object.entries(snap.val()).forEach(([id, info]) => {
                    div.innerHTML += `
                    <div class="censo-item">
                        <span>${info.nombre} (@${id})</span>
                        <button class="btn btn-primary" onclick="document.getElementById('search_id').value='${id}'; buscarAlumno();">ABRIR</button>
                    </div>`;
                });
            }
        });

        // Reloj
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES'); }, 1000);

        // Discord Mock Login (Igual que el anterior)
        window.loginDiscord = () => { document.getElementById('login-overlay').style.display = 'none'; };
    </script>
</body>
</html>
