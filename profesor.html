<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.E. ADMIN - Sistema de Gestión Estatal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #05070a; --bg-card: #0f121a; --border: #334155;
            --accent-cnp: #1e40af; --accent-gc: #064e3b; --text-main: #f8fafc;
            --text-dim: #94a3b8; --danger: #ef4444; --success: #10b981;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--primary); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* OVERLAY LOGIN CORREGIDO */
        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #05070a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .main-view { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav {
            padding: 15px 40px; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }

        .container { padding: 30px 40px; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 400px 1fr 350px; gap: 20px; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 20px; }
        .card h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 15px; }

        input, select {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px; color: white; font-size: 0.85rem; margin-bottom: 10px;
        }

        .btn {
            padding: 10px; border-radius: 8px; border: none; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.65rem;
        }
        .btn-primary { background: white; color: black; }
        .btn-danger { background: var(--danger); color: white; }
        
        .timer-display { font-family: 'JetBrains Mono'; font-size: 1.5rem; color: var(--success); display: block; text-align: center; margin: 10px 0; }

        /* CHAT */
        #chat-box { height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; border: 1px solid var(--border); font-size: 0.8rem; margin-bottom: 10px; }
        .msg { margin-bottom: 8px; padding: 5px; border-radius: 4px; }
        .msg-admin { border-left: 3px solid var(--success); background: rgba(16, 185, 129, 0.1); }
        .msg-user { border-left: 3px solid var(--accent-cnp); background: rgba(30, 64, 175, 0.1); }

        #clock { font-family: 'JetBrains Mono'; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div style="text-align: center; background: var(--bg-card); padding: 40px; border-radius: 20px; border: 1px solid var(--border);">
            <h2 style="margin-bottom: 20px;">S.I.G.E. ADMIN</h2>
            <button class="btn btn-primary" style="width: 100%; padding: 15px;" onclick="document.getElementById('login-overlay').style.display='none'">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div class="main-view">
        <nav class="top-nav">
            <div style="font-weight: 800; font-size: 1.2rem;">S.I.G.E. <span style="color:var(--text-dim)">ADMIN</span></div>
            <div style="display: flex; gap: 20px; align-items: center;">
                <div id="clock">18:42:31</div>
                <input type="text" id="search_id" placeholder="ID Alumno..." style="width: 150px; margin:0;">
                <button class="btn btn-primary" onclick="cargarAlumno()">CARGAR</button>
            </div>
        </nav>

        <div class="container">
            <div class="grid">
                <!-- COLUMNA IZQUIERDA: CONTROLES GLOBALES -->
                <div class="col">
                    <div class="card">
                        <h3><i class="fas fa-stopwatch"></i> Temporizadores</h3>
                        <div>
                            <span style="font-size: 0.6rem;">CNP</span>
                            <div class="timer-display" id="disp-CNP">00:00</div>
                            <div style="display: flex; gap: 5px;">
                                <button class="btn btn-primary" style="flex:1" onclick="controlTimer('CNP', true)">START</button>
                                <button class="btn btn-danger" style="flex:1" onclick="controlTimer('CNP', false)">STOP</button>
                            </div>
                        </div>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
                        <button class="btn btn-danger" style="width: 100%;" onclick="resetAllTimers()">RESET GENERAL</button>
                    </div>

                    <div class="card">
                        <h3><i class="fas fa-bell"></i> Notificar Alumno</h3>
                        <input type="text" id="notif_msg" placeholder="Mensaje urgente...">
                        <button class="btn btn-primary" style="width: 100%; background: #facc15; color: black;" onclick="enviarNotificacion()">ENVIAR ALERTA PANTALLA</button>
                    </div>
                </div>

                <!-- COLUMNA CENTRAL: EXPEDIENTE -->
                <div class="col">
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <h3><i class="fas fa-file-invoice"></i> Expediente: <span id="current_user_display">Ninguno</span></h3>
                            <select id="set_cuerpo" style="width: 150px; margin:0;" onchange="actualizarCuerpo()">
                                <option value="NINGUNO">Sin Cuerpo</option>
                                <option value="CNP">CNP</option>
                                <option value="GC">G. CIVIL</option>
                            </select>
                        </div>
                        <div id="lista-examenes" style="margin-top: 20px;"></div>
                    </div>
                </div>

                <!-- COLUMNA DERECHA: COMUNICACIONES -->
                <div class="col">
                    <div class="card">
                        <h3><i class="fas fa-comments"></i> Chat Directo</h3>
                        <div id="chat-box"></div>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="chat_input" placeholder="Escribir..." style="margin:0;">
                            <button class="btn btn-primary" onclick="enviarChat()"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                    
                    <div class="card">
                        <h3><i class="fas fa-users"></i> Censo</h3>
                        <div id="censo-list" style="max-height: 200px; overflow-y: auto;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- TEMPORIZADORES CORREGIDOS ---
        window.controlTimer = (dept, status) => {
            update(ref(db, `timers/${dept}`), { running: status });
        };

        window.resetAllTimers = () => {
            set(ref(db, `timers/CNP`), { seconds: 0, running: false });
        };

        onValue(ref(db, `timers/CNP`), (snap) => {
            if(snap.exists()) {
                const data = snap.val();
                document.getElementById('disp-CNP').innerText = formatTime(data.seconds || 0);
            }
        });

        // Motor del cronómetro (Solo aumenta si 'running' es true)
        setInterval(() => {
            const timerRef = ref(db, `timers/CNP`);
            get(timerRef).then(snap => {
                if(snap.exists() && snap.val().running) {
                    update(timerRef, { seconds: snap.val().seconds + 1 });
                }
            });
        }, 1000);

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
        }

        // --- GESTIÓN DE ALUMNO Y CHAT ---
        let currentID = "";

        window.cargarAlumno = () => {
            currentID = document.getElementById('search_id').value.trim();
            if(!currentID) return;
            document.getElementById('current_user_display').innerText = currentID;
            
            // Cargar cuerpo
            onValue(ref(db, `users/${currentID}/cuerpo`), (snap) => {
                document.getElementById('set_cuerpo').value = snap.val() || "NINGUNO";
            });

            // Cargar Chat
            onValue(ref(db, `chats/${currentID}`), (snap) => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                if(snap.exists()){
                    Object.values(snap.val()).forEach(m => {
                        box.innerHTML += `<div class="msg ${m.user==='ADMIN'?'msg-admin':'msg-user'}"><b>${m.user}:</b> ${m.text}</div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        };

        window.actualizarCuerpo = () => {
            if(!currentID) return;
            update(ref(db, `users/${currentID}`), { cuerpo: document.getElementById('set_cuerpo').value });
        };

        window.enviarChat = () => {
            const txt = document.getElementById('chat_input').value;
            if(!currentID || !txt) return;
            push(ref(db, `chats/${currentID}`), { user: "ADMIN", text: txt, time: Date.now() });
            document.getElementById('chat_input').value = "";
        };

        // --- NOTIFICACIONES INDIVIDUALES ---
        window.enviarNotificacion = () => {
            const msg = document.getElementById('notif_msg').value;
            if(!currentID || !msg) return alert("Carga un alumno y escribe un mensaje");
            set(ref(db, `notifications/${currentID}`), {
                message: msg,
                type: "URGENTE",
                timestamp: Date.now()
            }).then(() => {
                alert("Notificación enviada a la pantalla del alumno");
                document.getElementById('notif_msg').value = "";
            });
        };

        // Censo
        onValue(ref(db, 'estudiantes_registrados'), snap => {
            const div = document.getElementById('censo-list');
            div.innerHTML = "";
            if(snap.exists()){
                Object.entries(snap.val()).forEach(([id, info]) => {
                    div.innerHTML += `<div style="font-size:0.7rem; padding:5px; border-bottom:1px solid #222;">${info.nombre} (${id})</div>`;
                });
            }
        });

        // Reloj Spain
        setInterval(() => {
            const options = { timeZone: 'Europe/Madrid', hour: '2-digit', minute: '2-digit', second: '2-digit' };
            document.getElementById('clock').innerText = new Intl.DateTimeFormat('es-ES', options).format(new Date());
        }, 1000);
    </script>
</body>
</html>
