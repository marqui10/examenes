<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.E. v4.0 - Panel de Administración Central</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #05070a; --bg-card: #0f121a; --border: #334155;
            --accent: #3b82f6; --danger: #ef4444; --success: #10b981;
            --text-main: #f8fafc; --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--primary); color: var(--text-main);
            margin: 0; display: flex; height: 100vh; overflow: hidden;
        }

        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #05070a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .sidebar {
            width: 260px; background: #0a0c12; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px;
        }
        .nav-item {
            padding: 12px 15px; border-radius: 10px; cursor: pointer; color: var(--text-dim);
            transition: 0.3s; margin-bottom: 5px; display: flex; align-items: center; gap: 12px; font-weight: 600;
        }
        .nav-item:hover, .nav-item.active { background: rgba(59, 130, 246, 0.1); color: white; }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; background: #05070a; }
        .top-nav { padding: 15px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        .btn-primary { background: white; color: black; }
        .btn-discord { background: #5865F2; color: white; }

        input, select, textarea {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px; color: white; margin-bottom: 10px; box-sizing: border-box;
        }

        .timer-display { font-family: 'JetBrains Mono'; font-size: 2.5rem; color: var(--success); text-align: center; margin: 15px 0; }
        
        /* Modal Expediente */
        #modal-expediente {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000;
            display: none; align-items: center; justify-content: center;
        }

        .exp-row { background: #1a1d26; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="card" style="width: 350px; text-align: center;">
            <h2 style="margin-bottom: 5px;">S.I.G.E.</h2>
            <button class="btn btn-discord" style="width: 100%;" onclick="loginDiscord()">ENTRAR CON DISCORD</button>
            <p id="auth-status" style="margin-top: 15px; font-size: 0.7rem;"></p>
        </div>
    </div>

    <!-- MODAL EXPEDIENTE -->
    <div id="modal-expediente">
        <div class="card" style="width: 600px; max-height: 80vh; overflow-y: auto;">
            <h2 id="exp-nombre">Expediente</h2>
            <div id="exp-contenido"></div>
            <button class="btn btn-danger" style="width: 100%; margin-top: 20px;" onclick="document.getElementById('modal-expediente').style.display='none'">CERRAR</button>
        </div>
    </div>

    <div class="sidebar">
        <div style="font-weight: 800; font-size: 1.4rem; margin-bottom: 30px;">SIGE ADMIN</div>
        <div class="nav-item active" onclick="showView('general')"><i class="fas fa-home"></i> General</div>
        <hr style="border:0; border-top: 1px solid var(--border); margin: 10px 0;">
        <div class="nav-item" onclick="accessCuerpo('CNP')"><i class="fas fa-shield-alt"></i> C.N.P.</div>
        <div class="nav-item" onclick="accessCuerpo('GC')"><i class="fas fa-horse"></i> G. Civil</div>
        <div class="nav-item" onclick="accessCuerpo('BOMBEROS')"><i class="fas fa-fire"></i> Bomberos</div>
    </div>

    <div class="main-content">
        <nav class="top-nav">
            <div>ESPAÑA: <span id="clock-spain">--:--:--</span></div>
            <div id="user-info" style="font-size: 0.8rem; font-weight: bold;"></div>
        </nav>

        <div class="container" id="view-general">
            <div class="card">
                <h3>Asignación de Rama</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="assign-user-id" placeholder="ID Discord Alumno" style="margin:0;">
                    <select id="assign-cuerpo" style="margin:0;">
                        <option value="CNP">CNP</option>
                        <option value="GC">G. Civil</option>
                        <option value="BOMBEROS">Bomberos</option>
                    </select>
                    <button class="btn btn-primary" onclick="assignUser()">ASIGNAR</button>
                </div>
            </div>
            <div class="card">
                <h3>Aviso General</h3>
                <textarea id="global-notice"></textarea>
                <button class="btn btn-primary" onclick="postNotice()">PUBLICAR</button>
            </div>
        </div>

        <div class="container" id="view-cuerpo" style="display: none;">
            <h2 id="cuerpo-title">CUERPO</h2>
            <div class="card">
                <h3>Temporizador Rama</h3>
                <div class="timer-display" id="timer-val">00:00:00</div>
                <div style="display: flex; gap: 10px;">
                    <input type="datetime-local" id="target-time" style="margin:0;">
                    <button class="btn btn-primary" onclick="startGlobalTimer()">INICIAR CUENTA ATRÁS</button>
                </div>
            </div>
            <div class="card">
                <h3>Alumnos en Rama</h3>
                <div id="alumno-list"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let currentCuerpo = "";
        let timerInterval = null;

        // --- ARREGLO: TEMPORIZADOR ---
        window.startGlobalTimer = () => {
            const target = document.getElementById('target-time').value;
            if(!target) return alert("Selecciona fecha y hora");
            const endTime = new Date(target).getTime();
            set(ref(db, `timers/${currentCuerpo}`), { target: endTime, active: true });
        };

        function runTimerLogic(endTime) {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const now = new Date().getTime();
                const diff = endTime - now;

                if (diff <= 0) {
                    document.getElementById('timer-val').innerText = "00:00:00";
                    clearInterval(timerInterval);
                    return;
                }

                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                document.getElementById('timer-val').innerText = 
                    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        // --- ARREGLO: EXPEDIENTE ---
        window.verExpediente = async (alumnoID, nombre) => {
            document.getElementById('modal-expediente').style.display = 'flex';
            document.getElementById('exp-nombre').innerText = `Expediente: ${nombre}`;
            const cont = document.getElementById('exp-contenido');
            cont.innerHTML = "Cargando...";

            const snap = await get(ref(db, `examenes/${alumnoID}`));
            cont.innerHTML = "";
            if(snap.exists()){
                Object.values(snap.val()).forEach(ex => {
                    cont.innerHTML += `
                        <div class="exp-row">
                            <b>${ex.titulo}</b> - Nota: <span style="color:var(--success)">${ex.nota || 'S/N'}</span><br>
                            <small>${ex.comentario || 'Sin observaciones'}</small>
                        </div>`;
                });
            } else {
                cont.innerHTML = "No hay exámenes registrados.";
            }
        };

        // --- RESTO DE LÓGICA (MANTENIDA) ---
        window.accessCuerpo = async (cuerpo) => {
            const pass = prompt(`Pass para ${cuerpo}:`);
            const snap = await get(ref(db, `config/passwords/${cuerpo}`));
            if (snap.exists() && snap.val() === pass) {
                currentCuerpo = cuerpo;
                openCuerpoView(cuerpo);
            } else alert("Error");
        };

        function openCuerpoView(cuerpo) {
            showView('cuerpo');
            document.getElementById('cuerpo-title').innerText = cuerpo;
            
            onValue(ref(db, `timers/${cuerpo}`), (snap) => {
                if(snap.exists() && snap.val().active) runTimerLogic(snap.val().target);
            });

            onValue(ref(db, 'estudiantes_registrados'), (snap) => {
                const list = document.getElementById('alumno-list');
                list.innerHTML = "";
                if(snap.exists()){
                    Object.entries(snap.val()).forEach(([id, info]) => {
                        if(info.cuerpo === cuerpo) {
                            const row = document.createElement('div');
                            row.className = 'card';
                            row.style = 'display:flex; justify-content:space-between; align-items:center; padding:10px;';
                            row.innerHTML = `<span>${info.nombre}</span>`;
                            const btn = document.createElement('button');
                            btn.className = 'btn btn-primary';
                            btn.innerText = 'VER EXPEDIENTE';
                            btn.onclick = () => verExpediente(id, info.nombre);
                            row.appendChild(btn);
                            list.appendChild(row);
                        }
                    });
                }
            });
        }

        window.loginDiscord = () => { document.getElementById('login-overlay').style.display='none'; };
        window.showView = (v) => {
            document.getElementById('view-general').style.display = v === 'general' ? 'block' : 'none';
            document.getElementById('view-cuerpo').style.display = v === 'cuerpo' ? 'block' : 'none';
        };
        window.assignUser = () => {
            const id = document.getElementById('assign-user-id').value;
            const c = document.getElementById('assign-cuerpo').value;
            update(ref(db, `estudiantes_registrados/${id}`), { cuerpo: c });
            alert("Asignado");
        };

        setInterval(() => {
            document.getElementById('clock-spain').innerText = new Date().toLocaleTimeString('es-ES');
        }, 1000);
    </script>
</body>
</html>
