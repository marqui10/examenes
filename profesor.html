<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S.I.G.E. PRO - Panel Profesor</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg:#05070a;
    --card:#0f121a;
    --border:#1e293b;
    --text:#f8fafc;
    --dim:#94a3b8;
    --ok:#10b981;
    --bad:#ef4444;
}

body {
    margin:0;
    font-family:'Plus Jakarta Sans';
    background:var(--bg);
    color:var(--text);
    display:flex;
}

/* SIDEBAR */
.sidebar {
    width:250px;
    background:#000;
    padding:20px;
    border-right:1px solid var(--border);
}

.sidebar h1 { font-size:1.2rem; }

/* MAIN */
.main {
    flex:1;
    display:flex;
    flex-direction:column;
}

.topbar {
    padding:20px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
}

.container {
    padding:30px;
}

/* CARD */
.card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

/* INPUT */
input,select {
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#000;
    border:1px solid var(--border);
    color:white;
}

/* BUTTON */
.btn {
    background:white;
    color:black;
    padding:10px;
    border:none;
    cursor:pointer;
    font-weight:800;
}

.btn:active { transform:scale(0.98); }

/* EXAM */
.exam {
    border-left:4px solid var(--border);
    padding:15px;
    margin-bottom:10px;
    background:#000;
}

.apto { border-color:var(--ok); }
.noapto { border-color:var(--bad); }

/* TOAST */
#toast {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#000;
    padding:15px;
    border:1px solid var(--border);
    display:none;
}
</style>
</head>

<body>

<div class="sidebar">
    <h1>S.I.G.E PRO</h1>
</div>

<div class="main">

<div class="topbar">
    <input id="search" placeholder="Buscar alumno">
    <button class="btn" onclick="buscar()">Buscar</button>
</div>

<div class="container">

<div class="card">
    <h3>Crear Examen</h3>
    <input id="id" placeholder="Alumno ID">
    <input id="titulo" placeholder="Título">
    <input id="url" placeholder="URL">
    <select id="dept">
        <option>CNP</option>
        <option>GC</option>
    </select>
    <button class="btn" onclick="crear()">Crear</button>
</div>

<div class="card">
    <h3>Exámenes</h3>
    <div id="lista"></div>
</div>

</div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app = initializeApp({
    apiKey: "TU_API",
    databaseURL: "TU_DB"
});

const db = getDatabase(app);

let current = null;

/* ===== UTILS ===== */

const $ = id => document.getElementById(id);

function toast(msg) {
    const t = $("toast");
    t.innerText = msg;
    t.style.display = "block";
    setTimeout(()=>t.style.display="none",2000);
}

function clean(t) {
    return t.replace(/[<>]/g,"");
}

/* ===== CREAR ===== */

window.crear = async () => {
    const id = clean($("id").value);
    const titulo = clean($("titulo").value);

    if(!id || !titulo) return toast("Datos incompletos");

    await push(ref(db,"examenes/"+id),{
        titulo,
        url:$("url").value,
        dept:$("dept").value,
        fecha:Date.now()
    });

    toast("Examen creado");
};

/* ===== BUSCAR ===== */

window.buscar = () => {
    const id = clean($("search").value);
    if(!id) return;

    current = id;

    onValue(ref(db,"examenes/"+id),(snap)=>{
        render(snap.val());
    });
};

/* ===== RENDER ===== */

function render(data) {
    const cont = $("lista");
    cont.innerHTML = "";

    if(!data) {
        cont.innerHTML = "Sin datos";
        return;
    }

    Object.entries(data).forEach(([k,v])=>{
        const div = document.createElement("div");
        div.className = "exam";

        const nota = parseFloat(v.nota);
        if(!isNaN(nota)) {
            div.classList.add(nota>=5 ? "apto":"noapto");
        }

        div.innerHTML = `
            <strong>${v.titulo}</strong>
            <div>${v.dept}</div>
            <div>Nota: ${v.nota || "PND"}</div>
        `;

        cont.appendChild(div);
    });
}

</script>

</body>
</html>
