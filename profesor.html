<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.I.G.E. - Gestión Administrativa Estatal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #05070a;
            --bg-card: #0f121a;
            --border: #334155;
            --accent-cnp: #1e40af;
            --accent-gc: #064e3b;
            --accent-fire: #991b1b;
            --accent-ems: #0891b2;
            --accent-dgt: #854d0e;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --discord: #5865F2;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--primary); color: var(--text-main);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow-x: hidden;
        }

        /* --- LOGIN OVERLAY --- */
        #login-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at center, #1e293b 0%, #05070a 100%);
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(15, 18, 26, 0.8); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 24px; border: 1px solid var(--border);
            width: 100%; max-width: 350px; text-align: center;
        }

        /* --- MAIN CONTENT --- */
        .main-view { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        
        .top-nav {
            padding: 15px 40px; background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10;
        }

        .container { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .card h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-top: 0; }

        input, select, textarea {
            width: 100%; background: #000; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px; color: white; font-size: 0.9rem; margin-bottom: 10px; box-sizing: border-box;
        }

        .btn {
            padding: 12px; border-radius: 8px; border: none; font-weight: 800;
            cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 0.75rem;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-primary { background: white; color: black; width: 100%; }
        .btn-discord { background: var(--discord); color: white; width: 100%; }

        .exam-row {
            background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px;
        }

        @media (max-width: 900px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- ACCESO RESTRINGIDO -->
    <div id="login-overlay">
        <div class="login-card">
            <div style="font-weight: 800; font-size: 1.5rem; margin-bottom: 5px;">S.I.G.E. <span style="color:var(--accent-cnp)">ADMIN</span></div>
            <p id="status-msg" style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 30px;">ACCESO RESTRINGIDO A TRIBUNAL</p>
            
            <button class="btn btn-discord" onclick="loginDiscord()">
                <i class="fab fa-discord"></i> Entrar como Administrador
            </button>
        </div>
    </div>

    <div class="main-view">
        <nav class="top-nav">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div style="font-weight: 800; font-size: 1.2rem;">S.I.G.E. <span style="color: var(--text-dim);">3.0</span></div>
                <div style="font-size: 0.7rem; color: #475569; border-left: 1px solid var(--border); padding-left: 20px;">
                    <i class="fas fa-clock"></i> <span id="clock">--:--:--</span>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="search_id" placeholder="ID Discord del Alumno..." style="width: 250px; margin:0;">
                <button class="btn btn-primary" style="width: auto;" onclick="buscarAlumno()">CARGAR EXPEDIENTE</button>
            </div>
        </nav>

        <div class="container">
            <div class="grid">
                <div class="left-col">
                    <div class="card">
                        <h3>Asignar Nueva Prueba</h3>
                        <select id="reg_dept">
                            <option value="CNP">CNP</option>
                            <option value="GC">GC</option>
                            <option value="BOMBEROS">BOMBEROS</option>
                            <option value="SANITARIOS">SANITARIOS</option>
                            <option value="DGT">DGT</option>
                        </select>
                        <input type="text" id="id_alumno" placeholder="ID Alumno (Discord)">
                        <input type="text" id="titulo_examen" placeholder="Nombre del Examen">
                        <input type="url" id="url_examen" placeholder="Link (Formulario/Evidencia)">
                        <button class="btn btn-primary" onclick="crearExamen()" style="background: var(--accent-cnp); color:white;">Publicar Prueba</button>
                    </div>

                    <div class="card">
                        <h3>Censo de Aspirantes</h3>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="new_alum_name" placeholder="Nombre Real">
                            <input type="text" id="new_alum_id" placeholder="ID Discord" style="width: 100px;">
                            <button class="btn btn-primary" style="width: 45px;" onclick="registrarAlumno()">+</button>
                        </div>
                        <div id="lista-censo" style="margin-top: 15px; max-height: 300px; overflow-y: auto;"></div>
                    </div>
                </div>

                <div class="right-col">
                    <div class="card">
                        <h3>Calificaciones y Veredictos</h3>
                        <div id="contenedorExamenes">
                            <p style="color:var(--text-dim); text-align:center; font-size:0.8rem;">Cargue un expediente para ver las pruebas.</p>
                        </div>
                    </div>

                    <div class="card" id="panel-obs" style="display:none;">
                        <h3>Observaciones Generales del Expediente</h3>
                        <textarea id="obs_text" rows="6" placeholder="Escriba aquí el seguimiento del alumno..."></textarea>
                        <button class="btn btn-primary" onclick="guardarObs()">Actualizar Expediente</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, update, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBRR_uvjwiyB5b9ugjd0LFgev3a5RvRrrs",
            authDomain: "examenes-profesoralumno.firebaseapp.com",
            databaseURL: "https://examenes-profesoralumno-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "examenes-profesoralumno",
            storageBucket: "examenes-profesoralumno.firebasestorage.app",
            messagingSenderId: "503796832177",
            appId: "1:503796832177:web:b306d6971c8ed7a9becf90"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const CLIENT_ID = '1500201403484737616';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        window.loginDiscord = () => {
            const url = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
            window.location.href = url;
        };

        async function handleAuth() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const token = params.get('access_token');

            if (token) {
                document.getElementById('status-msg').innerText = "Verificando Rango...";
                const res = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
                const user = await res.json();
                
                const adminSnap = await get(ref(db, 'config/admins_autorizados/' + user.username));
                
                if (adminSnap.exists() && adminSnap.val().activo === true) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                    document.getElementById('login-overlay').style.display = 'none';
                } else {
                    document.getElementById('status-msg').innerHTML = `<span style="color:#ef4444">ACCESO DENEGADO: ${user.username}</span>`;
                }
            }
        }

        window.buscarAlumno = () => {
            const id = document.getElementById('search_id').value.trim();
            if(!id) return;
            document.getElementById('panel-obs').style.display = 'block';

            onValue(ref(db, 'examenes/' + id), (snap) => {
                const container = document.getElementById('contenedorExamenes');
                container.innerHTML = "";
                if(snap.exists()){
                    Object.entries(snap.val()).forEach(([key, t]) => {
                        container.innerHTML += `
                            <div class="exam-row" style="border-left: 4px solid var(--accent-${t.dept.toLowerCase()})">
                                <div style="display:flex; justify-content:space-between;">
                                    <small>${t.dept} - ${t.titulo}</small>
                                    <b style="color:var(--accent-cnp)">${t.nota || 'PND'}</b>
                                </div>
                                <div style="display:flex; gap:10px; margin-top:10px;">
                                    <input type="number" id="n_${key}" value="${t.nota || ''}" placeholder="Nota" style="margin:0; width:80px;">
                                    <input type="text" id="c_${key}" value="${t.comentario || ''}" placeholder="Feedback" style="margin:0;">
                                    <button class="btn btn-primary" style="width:45px;" onclick="saveGrade('${id}','${key}')"><i class="fas fa-save"></i></button>
                                </div>
                            </div>`;
                    });
                } else {
                    container.innerHTML = "<p style='color:var(--text-dim); text-align:center;'>Sin exámenes registrados.</p>";
                }
            });

            get(ref(db, 'planificacion/' + id)).then(s => {
                document.getElementById('obs_text').value = s.exists() ? s.val().objetivos : "";
            });
        };

        window.saveGrade = (aid, eid) => {
            update(ref(db, `examenes/${aid}/${eid}`), {
                nota: document.getElementById(`n_${eid}`).value,
                comentario: document.getElementById(`c_${eid}`).value
            });
            alert("CALIFICACIÓN ACTUALIZADA");
        };

        window.crearExamen = async () => {
            const id = document.getElementById('id_alumno').value;
            if(!id) return alert("Inserte ID de Alumno");
            await push(ref(db, 'examenes/' + id), {
                titulo: document.getElementById('titulo_examen').value,
                url: document.getElementById('url_examen').value,
                dept: document.getElementById('reg_dept').value
            });
            alert("PRUEBA PUBLICADA");
        };

        window.registrarAlumno = () => {
            const id = document.getElementById('new_alum_id').value;
            if(!id) return;
            set(ref(db, 'estudiantes_registrados/' + id), { nombre: document.getElementById('new_alum_name').value });
        };

        onValue(ref(db, 'estudiantes_registrados'), (snap) => {
            const list = document.getElementById('lista-censo');
            list.innerHTML = "";
            if(snap.exists()) Object.entries(snap.val()).forEach(([id, info]) => {
                list.innerHTML += `<div style="font-size:0.75rem; padding:8px; border-bottom:1px solid var(--border)">${info.nombre} <span style="color:var(--text-dim)">(@${id})</span></div>`;
            });
        });

        window.guardarObs = () => {
            const id = document.getElementById('search_id').value;
            set(ref(db, 'planificacion/' + id), { objetivos: document.getElementById('obs_text').value });
            alert("EXPEDIENTE ACTUALIZADO");
        };

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES');
        }, 1000);

        handleAuth();
    </script>
</body>
</html>
